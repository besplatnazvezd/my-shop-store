<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS: CODE ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Fira Code', monospace; overflow: hidden; }
        .unbound { font-family: 'Montserrat', sans-serif; }
        
        /* РЕДАКТОР */
        #editor-container { height: 40vh; background: #151515; border-bottom: 2px solid #bc13fe; position: relative; }
        textarea { 
            width: 100%; height: 100%; background: transparent; color: #00ff88; 
            padding: 20px; font-size: 14px; outline: none; resize: none;
            border: none;
        }

        /* ПРЕВЬЮ (РЕЗУЛЬТАТ КОДА) */
        #preview-container { height: 35vh; background: #fff; position: relative; overflow: auto; }
        #preview-frame { width: 100%; height: 100%; border: none; background: #fff; }

        /* ИНТЕРФЕЙС */
        .glass-panel { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 15px; }
        .btn-run { background: #bc13fe; color: #fff; font-weight: 900; padding: 12px 25px; border-radius: 12px; transition: 0.3s; }
        .btn-run:active { transform: scale(0.9); }

        .task-box { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); padding: 15px; border-top: 1px solid #333; z-index: 100; }
    </style>
</head>
<body>

    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <div class="p-4 flex justify-between items-center glass-panel">
        <div>
            <p class="text-[8px] opacity-40 uppercase">Level: <span id="lvl-name">Junior</span></p>
            <div class="flex items-center gap-2">
                <span id="bal-boss" class="unbound text-xl text-purple-500">0</span>
                <span class="text-[10px] font-bold">BC</span>
            </div>
        </div>
        <button onclick="tg.close()" class="text-xs opacity-50">Выход</button>
    </div>

    <!-- РЕДАКТОР КОДА -->
    <div id="editor-container">
        <textarea id="code-editor" spellcheck="false" placeholder="Пиши код здесь..."></textarea>
                <div class="absolute top-2 right-2 text-[10px] opacity-30 uppercase">HTML / CSS Editor</div>
    </div>

    <!-- ПРЕВЬЮ -->
    <div id="preview-container">
        <div id="preview-content" style="color: #000; padding: 20px;">
            <!-- Сюда рендерится код юзера -->
            <p style="color: #888; font-family: sans-serif;">Результат твоего кода будет здесь...</p>
        </div>
    </div>

    <!-- ПАНЕЛЬ ЗАДАНИЯ -->
    <div class="task-box">
        <div class="flex justify-between items-start gap-4">
            <div class="flex-1">
                <p id="task-desc" class="text-xs text-purple-300 font-bold mb-1">Урок 1: Создай заголовок своего магазина. Напиши &lt;h1&gt;BOSS STORE&lt;/h1&gt;</p>
                <p class="text-[8px] opacity-40 uppercase">Награда: 50 BOSS COINS</p>
            </div>
            <button onclick="runCode()" class="btn-run unbound text-xs uppercase">Запустить!</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let currentLevel = 0;
        let bossBalance = 0;

        const LESSONS = [
            {
                desc: "Урок 1: Создай заголовок. Напиши <h1>BOSS STORE</h1>",
                target: "<h1>BOSS STORE</h1>",
                reward: 50
            },
            {
                desc: "Урок 2: Сделай текст красным. Добавь <h1 style='color:red'>BOSS</h1>",
                target: "color:red",
                reward: 100
            },
            {
                desc: "Урок 3: Создай кнопку. Напиши <button>КУПИТЬ</button>",
                target: "<button>",
                reward: 150
            },
            {
                desc: "Урок 4: Сделай кнопку фиолетовой. Используй style='background:purple; color:white'",
                target: "background:purple",
                reward: 200
            }
        ];

        function runCode() {
            const code = document.getElementById('code-editor').value;
            const preview = document.getElementById('preview-content');
            
            // 1. Отрисовка в превью
            preview.innerHTML = code;
            
            // Эффект нажатия
            tg.HapticFeedback.impactOccurred('medium');

            // 2. Проверка задания
            const currentTask = LESSONS[currentLevel];
            
            // Простая проверка на наличие нужной строки в коде
            if (code.toLowerCase().includes(currentTask.target.toLowerCase())) {
                completeLevel(currentTask.reward);
            }
        }

        function completeLevel(reward) {
            bossBalance += reward;
            document.getElementById('bal-boss').innerText = bossBalance;
            
            currentLevel++;
            if(currentLevel < LESSONS.length) {
                alert(`ОТЛИЧНО! Ты заработал ${reward} BC. Переходим к следующему уроку.`);
                document.getElementById('task-desc').innerText = LESSONS[currentLevel].desc;
                document.getElementById('code-editor').value = ""; // Очистка для нового уровня
            } else {
                alert("ПОЗДРАВЛЯЮ! Ты прошел базовый курс Академии BOSS. Теперь ты Senior Разработчик!");
                document.getElementById('lvl-name').innerText = "Senior Developer";
            }
            
            tg.HapticFeedback.notificationOccurred('success');
        }

        // Автофокус на редактор
        document.getElementById('code-editor').focus();
    </script>
</body>
</html>
