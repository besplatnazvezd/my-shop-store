<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS HACK | ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #bc13fe; --gold: #FFD700; --bg: #020202; }
        body { background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; overflow-x: hidden; }

        /* CRT ЭФФЕКТ (Линии сканирования) */
        body::before {
            content: " "; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; z-index: 9999; pointer-events: none;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-text { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .gold-text { color: var(--gold); text-shadow: 0 0 15px var(--gold); }

        /* ИНТРО ЗАГРУЗКА */
        #boot-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; padding: 20px; font-size: 12px; color: #0f0; overflow: hidden; }

        /* ГЛИТЧ ПРИ ОШИБКЕ */
        .glitch { animation: glitch 0.3s cubic-bezier(.25,.46,.45,.94) both infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        .safe-box { background: rgba(10, 10, 10, 0.9); border: 1px solid #222; position: relative; overflow: hidden; }
        .digit-in { width: 14%; height: 55px; background: #000; border: 1px solid #333; border-radius: 5px; text-align: center; font-size: 24px; color: var(--gold); outline: none; transition: 0.2s; font-family: 'Orbitron'; }
                .digit-in:focus { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); }

        .progress-bar { width: 0%; height: 2px; background: var(--neon); transition: width 0.1s; }

        /* МОДАЛКА ВЫИГРЫША */
        #win-ui { position: fixed; inset: 0; background: #000; z-index: 10001; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

        .hint-btn { background: rgba(255, 215, 0, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; border-radius: 5px; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body class="p-4">

    <!-- BIOS BOOT SCREEN -->
    <div id="boot-screen">
        <div id="boot-logs"></div>
    </div>

    <!-- HEADER -->
    <div class="text-center mb-6">
        <h1 class="orbitron text-3xl font-black neon-text italic uppercase">BOSS HACK v4.0</h1>
        <p class="text-[8px] opacity-30 tracking-[0.4em] uppercase">Secure Connection Established</p>
    </div>

    <!-- JACKPOT -->
    <div class="bg-white/5 border border-white/10 rounded-2xl p-4 mb-6 text-center">
        <span class="text-[9px] opacity-40 uppercase font-black">Суммарный банк системы:</span>
        <div id="jp" class="orbitron text-2xl gold-text font-black">0.00 ₽</div>
    </div>

    <!-- SAFE -->
    <div id="main-frame" class="safe-box rounded-[25px] p-6 mb-6">
        <div class="flex justify-between mb-6">
            <input type="number" class="digit-in" oninput="nxt(this, 0)" id="d0">
            <input type="number" class="digit-in" oninput="nxt(this, 1)" id="d1">
            <input type="number" class="digit-in" oninput="nxt(this, 2)" id="d2">
            <input type="number" class="digit-in" oninput="nxt(this, 3)" id="d3">
            <input type="number" class="digit-in" oninput="nxt(this, 4)" id="d4">
            <input type="number" class="digit-in" oninput="nxt(this, 5)" id="d5">
        </div>

        <div class="h-1 bg-white/5 mb-6 overflow-hidden"><div id="p-bar" class="progress-bar"></div></div>
                <button onclick="hack()" id="h-btn" class="w-full bg-[#bc13fe] py-4 rounded-xl orbitron font-black text-sm uppercase shadow-lg shadow-purple-900/40 active:scale-95 transition-all">Инициировать Взлом</button>
        
        <div class="flex justify-between mt-4">
            <span class="text-[9px] opacity-30 uppercase font-black">Энергия: <span id="at" class="text-white">3</span>/3</span>
            <button onclick="getHint()" class="hint-btn uppercase font-black">Получить подсказку</button>
        </div>
    </div>

    <!-- LIVE LOGS -->
    <div class="bg-black/80 border border-white/5 p-4 rounded-xl mb-6 h-28 overflow-hidden text-[10px] text-white/20">
        <div id="logs"></div>
    </div>

    <!-- SPONSORS (10 СЛОТОВ) -->
    <div class="grid grid-cols-2 gap-3 mb-8">
        <script>
            for(let i=1; i<=10; i++) {
                document.write(`
                    <div onclick="addTry('https://t.me/osnovabossstore')" class="bg-white/5 border border-white/5 p-3 rounded-xl text-center active:bg-purple-900/20">
                        <p class="text-[7px] opacity-20 uppercase font-black">Server Node #${i}</p>
                        <p class="text-[10px] text-yellow-500 font-bold uppercase">CONNECT</p>
                    </div>
                `);
            }
        </script>
    </div>

    <!-- WIN MODAL -->
    <div id="win-ui">
        <div class="orbitron text-yellow-500 text-6xl mb-6 gold-text">ACCESS GRANTED</div>
        <div class="text-white text-xs mb-2 uppercase opacity-60">Поздравляем! Сейф BOSS STORE взломан!</div>
        <div id="final-sum" class="orbitron text-4xl font-black mb-10 text-white gold-glow">0.00 ₽</div>
        <button onclick="claim()" class="bg-[#bc13fe] px-12 py-5 rounded-2xl orbitron font-black uppercase text-sm animate-bounce">Забрать Приз</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const BOSS_CODE = "123456"; // ТВОЙ КОД
        const ADMIN = "nmproda";
        const BOT_TOKEN = "8730430332:AAGff_PCX2059o3EUwG-d9C19uTqcH4sAZ4";
        const ADMIN_ID = "7727345054";

        let state = JSON.parse(localStorage.getItem('BH4')) || { att: 3 };
        let jp = 0;
        let targetJp = 54812.90;

        // BIOS BOOT ANIMATION
        const bootLogs = [
            "Initializing BOSS_HACK Kernel...", "Checking Proxies...", "Bypassing Firewall...",
            "Loading Database...", "Handshaking with Server...", "ACCESS POINT FOUND.", "READY TO INJECT."
        ];
        let bl = 0;
        let bInt = setInterval(() => {
            const d = document.createElement('div');
            d.innerText = `> ${bootLogs[bl]}`;
            document.getElementById('boot-logs').appendChild(d);
            bl++;
            if(bl >= bootLogs.length) {
                clearInterval(bInt);
                setTimeout(() => { document.getElementById('boot-screen').style.display = 'none'; startJp(); }, 1000);
            }
        }, 300);

        function startJp() {
            let step = targetJp / 50;
            let c = 0;
            let i = setInterval(() => {
                c += step;
                if(c >= targetJp) { c = targetJp; clearInterval(i); drip(); }
                document.getElementById('jp').innerText = c.toLocaleString('ru-RU') + " ₽";
            }, 30);
        }

        function drip() {
            setInterval(() => {
                targetJp += Math.random();
                document.getElementById('jp').innerText = targetJp.toLocaleString('ru-RU', {minimumFractionDigits:2}) + " ₽";
            }, 1000);
        }

        function nxt(el, i) {
            if(el.value.length > 1) el.value = el.value.slice(0,1);
            if(el.value !== "" && i < 5) document.querySelectorAll('.digit-in')[i+1].focus();
        }

        function hack() {
            if(state.att <= 0) { glitch(); return; }
            let code = "";
            document.querySelectorAll('.digit-in').forEach(i => code += i.value);
            if(code.length < 6) return;

            state.att--; save(); updateUI();
            
            const btn = document.getElementById('h-btn');
            const pb = document.getElementById('p-bar');
            btn.disabled = true;
            btn.innerText = "INJECTING...";
            
            let w = 0;
            let pi = setInterval(() => {
                w += 5;
                pb.style.width = w + "%";
                if(w >= 100) {
                    clearInterval(pi);
                    if(code === BOSS_CODE) { win(); } 
                    else { glitch(); pb.style.width = "0%"; btn.disabled = false; btn.innerText = "Инициировать Взлом"; }
                }
            }, 100);
        }

        function glitch() {
            document.body.classList.add('glitch');
            tg.HapticFeedback.notificationOccurred('error');
            setTimeout(() => document.body.classList.remove('glitch'), 300);
            document.querySelectorAll('.digit-in').forEach(i => i.value = "");
            document.querySelectorAll('.digit-in')[0].focus();
            addLog("ACCESS DENIED: Hash Mismatch.");
        }

        function win() {
            document.getElementById('win-ui').style.display = 'flex';
            document.getElementById('final-sum').innerText = targetJp.toLocaleString('ru-RU') + " ₽";
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
            
            const user = tg.initDataUnsafe.user || {id: 0, username: 'anon'};
            const msg = `👑 ВЗЛОМ СЕЙФА v4.0! 👑\n💎 @${user.username} (ID: ${user.id})\n💰 Сумма: ${targetJp.toFixed(2)} ₽`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(msg)}`);
        }

        function claim() {
            const user = tg.initDataUnsafe.user || {id: 0, username: 'anon'};
            const txt = `БОСС, Я ВЗЛОМАЛ СИСТЕМУ! 🔓\n\nМоя добыча: ${targetJp.toFixed(2)} ₽\nМой ID: ${user.id}\nНик: @${user.username}\n\nЖду подтверждения транзакции! 🔥`;
            tg.openTelegramLink(`https://t.me/${ADMIN}?text=${encodeURIComponent(txt)}`);
        }

        function getHint() {
            alert(`ПОДСКАЗКА ОТ BOSS STORE:\nПервая цифра кода — ${BOSS_CODE[0]}\nЧтобы узнать больше, подпишись на все каналы!`);
            tg.HapticFeedback.impactOccurred('medium');
        }

        function addLog(m) {
            const l = document.getElementById('logs');
            const d = document.createElement('div');
            d.innerText = `> [${new Date().toLocaleTimeString()}] ${m}`;
            l.prepend(d);
            if(l.children.length > 5) l.lastChild.remove();
        }

        function addTry(link) {
            window.open(link);
            state.att++; save(); updateUI();
            addLog("Energy link established. +1 Try.");
        }

        function updateUI() {
            document.getElementById('at').innerText = state.att;
        }

        function save() { localStorage.setItem('BH4', JSON.stringify(state)); }
        updateUI();

        // Рандомные логи для движа
        setInterval(() => {
            const users = ["X-Ray", "Alpha", "Zero", "Morpheus", "Neo"];
            addLog(`Attempt detected from ${users[Math.floor(Math.random()*users.length)]}... Failed.`);
        }, 5000);
    </script>
</body>
</html>
