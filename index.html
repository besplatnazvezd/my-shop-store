<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        .cat-active { background: #fbbf24 !important; color: #000 !important; font-weight: 900; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-click:active { transform: scale(0.95); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="select-none">

    <!-- ШАПКА -->
    <header class="sticky top-0 z-50 bg-black/90 backdrop-blur-xl p-4 border-b border-yellow-500/20 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black italic text-yellow-500 uppercase tracking-tighter leading-none">BOSS STORE</h1>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-1 italic">Digital Agency</p>
        </div>
        <div class="flex gap-2">
            <!-- ПОДДЕРЖКА НА nmproda -->
            <button onclick="tg.openTelegramLink('https://t.me/nmproda')" class="bg-yellow-500/10 px-3 py-2 rounded-xl text-[10px] font-black border border-yellow-500/20 text-yellow-500 uppercase italic tracking-widest">Поддержка</button>
            <div class="bg-white/10 px-3 py-2 rounded-xl text-xs font-bold border border-white/10">🛒 <span id="cart-count">0</span></div>
        </div>
    </header>

    <!-- КАТЕГОРИИ -->
    <div id="cat-list" class="flex gap-2 overflow-x-auto no-scrollbar p-4 sticky top-[72px] z-40 bg-black/50 backdrop-blur-sm border-b border-white/5"></div>

    <!-- ВИТРИНА -->
    <main class="p-4 pb-48">
        <div id="catalog" class="grid grid-cols-2 gap-4">
            <p class="col-span-2 text-center py-10 text-gray-500 animate-pulse uppercase text-[10px] font-bold">Загрузка витрины...</p>
        </div>
    </main>

    <!-- ПАНЕЛЬ КОРЗИНЫ -->
    <div id="checkout-bar" class="fixed bottom-6 left-4 right-4 z-50 glass p-5 rounded-[32px] hidden border-yellow-500/40 shadow-2xl shadow-yellow-500/10">
        <div class="flex justify-between items-center">
            <div>
                                <p class="text-[10px] text-gray-400 uppercase font-black mb-1">К оплате:</p>
                <p id="total-price" class="text-2xl font-black text-yellow-500 italic leading-none">0 ₽</p>
            </div>
            <button onclick="confirmOrder()" id="main-confirm-btn" class="bg-yellow-500 text-black px-10 py-4 rounded-2xl font-black uppercase text-sm btn-click shadow-lg shadow-yellow-500/20 italic tracking-tighter">Оформить</button>
        </div>
    </div>

    <script>

        const tg = window.Telegram.WebApp;
        tg.expand();

        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzl2AehfvRtwWWz_6XDx96dsVing3RxzKf7X0afJ5HpgwUJCEFhYvTeWtxWa378tPJO/exec';
        const BOT_TOKEN = '8730430332:AAGff_PCX2059O3EUWG-d9C19uTqcH4sAZ4';
        const ADMIN_ID = '7727345054';
        const BOT_USER = 'BossStore_robot';
        const REKVIZITY = "💰 РЕКВИЗИТЫ: Т-Банк 2200 7019 5529 9232";

        let products = [];
        let cart = [];
        let currentCat = 'Все';

        async function loadData() {
            const catalogEl = document.getElementById('catalog');
            try {
                // Используем самый мощный способ обхода блокировок
                const response = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(GAS_URL));
                
                if (!response.ok) throw new Error('Ошибка сети');
                
                const data = await response.json();
                
                // Превращаем данные из таблицы в понятные для сайта
                products = data.map(p => ({
                    Name: p['Название'] || 'Без названия',
                    Price: parseFloat(p['Цена']) || 0,
                    Category: p['Категория'] || 'Все',
                    Description: p['Описание'] || '',
                    Image: p['Картинка'] || 'https://via.placeholder.com/150'
                }));

                renderCats();
                renderItems();
            } catch (e) {
                console.error(e);
                // ЕСЛИ НЕ ГРУЗИТ ИЗ ТАБЛИЦЫ — ПОКАЖЕМ ТЕСТОВЫЙ ТОВАР (чтобы витрина не была пустой)
                products = [{
                    Name: "Проверка связи 🚀",
                    Price: 0,
                    Category: "Тест",
                    Description: "Если ты видишь это, значит сайт работает, но Google Таблица заблокирована твоим провайдером. Включи другой VPN!",
                    Image: "https://via.placeholder.com/150"
                }];
                renderCats();
                renderItems();
            }
        }

        function renderCats() {
            const cats = ['Все', ...new Set(products.map(p => p.Category))];
            const listEl = document.getElementById('cat-list');
            if(listEl) {
                listEl.innerHTML = cats.map(c => `
                    <div onclick="currentCat='${c}';renderItems();" class="px-4 py-2 bg-white/5 rounded-xl text-[10px] uppercase font-bold border border-white/5 btn-click cursor-pointer">
                        ${c}
                    </div>
                `).join('');
            }
        }

        function renderItems() {
            const filtered = currentCat === 'Все' ? products : products.filter(p => p.Category === currentCat);
            const catalogEl = document.getElementById('catalog');
            if(catalogEl) {
                catalogEl.innerHTML = filtered.map((p, idx) => `
                    <div class="bg-white/5 border border-white/10 rounded-3xl p-4 glass">
                        <img src="${p.Image}" class="w-full h-32 object-cover rounded-2xl mb-3">
                        <h3 class="text-[12px] font-black italic uppercase leading-none mb-1">${p.Name}</h3>
                        <p class="text-[9px] text-gray-400 mb-3">${p.Description}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-yellow-500 font-black italic">${p.Price} ₽</span>
                            <button onclick="addToCart(${idx})" class="bg-yellow-500 text-black px-4 py-2 rounded-xl text-[10px] font-bold uppercase">В корзину</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function addToCart(idx) {
            cart.push(products[idx]);
            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        }

        function updateUI() {
            const total = cart.reduce((s, p) => s + p.Price, 0);
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('total-price').innerText = total + ' ₽';
            const bar = document.getElementById('checkout-bar');
            if (cart.length > 0) bar.classList.remove('hidden');
        }

        async function confirmOrder() {
            const btn = document.getElementById('main-confirm-btn');
            btn.innerText = "ОФОРМЛЯЕМ...";
            btn.disabled = true;

            const user = tg.initDataUnsafe.user || { first_name: 'Покупатель', id: null };
            const itemsList = cart.map(item => `• ${item.Name} (${item.Price}₽)`).join('\n');
            const total = cart.reduce((s, p) => s + p.Price, 0);

            const adminText = `🚀 НОВЫЙ ЗАКАЗ!\n👤 Клиент: ${user.first_name}\n🛒 Товары:\n${itemsList}\n💰 Итого: ${total} ₽`;
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: ADMIN_ID, text: adminText })
                });
                tg.showAlert("Заказ принят! Реквизиты: " + REKVIZITY);
                cart = [];
                updateUI();
                document.getElementById('checkout-bar').classList.add('hidden');
            } catch (e) {
                tg.showAlert("Ошибка при отправке заказа!");
            } finally {
                btn.innerText = "Оформить";
                btn.disabled = false;
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
