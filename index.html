                #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 10px 20px; border-radius: 50px; font-weight: 900; font-size: 10px; z-index: 10000; transition: 0.5s; }

                            <div><p class="text-[7px] font-black text-yellow\

    </style>

                if(!active) return; const r = c.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;

                if(t > (d.length/4)*0.5) { active = false; c.remove(); state.discount = 3; state.lastScratch = Date.now(); save(); updateCartUI(); confetti(); }
            };
            c.onmousedown = c.ontouchstart = () => active = true; window.onmouseup = window.ontouchend = () => active = false;
            c.onmousemove = c.ontouchmove = draw;
        }

        function openPay() { 
            const user = tg.initDataUnsafe.user || {id: '000'};
            let total = 0; 
            const list = state.cart.map(i => { 
                total += i.price; 
                state.orders.push({name: i.name, date: new Date().toLocaleDateString()});
                return i.name; 
            }).join(', ');
            
            const final = Math.floor(total * (1 - state.discount/100));
            tg.showConfirm(`Оплатить ${final} ₽?`, (ok) => {
                if(ok) {
                    tg.showAlert("Реквизиты:\nСБП: +79501700787\nТ-Банк\n\nСкинь чек менеджеру!");
                    setTimeout(() => {
                        window.open(`https://t.me/nmproda?text=Босс, оплатил(а) ${final}₽ за ${list}. Мой ID: ${user.id}`);
                        state.totalSpent += final; 
                        state.cart = [];
                        if(state.orders.length > 5) state.orders = state.orders.slice(-5);
                        save(); nav('shop');
                    }, 2000);
                }
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
