<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --bg: #000;
            --card: #0d0d0d;
            --text: #fff;
            --accent: #FFD700;
            --shadow: rgba(255, 215, 0, 0.2);
        }

        .light-theme {
            --gold: #3b82f6; /* Голубой */
            --bg: #ffffff;
            --card: #f3f4f6;
            --text: #111827;
            --accent: #3b82f6;
            --shadow: rgba(59, 130, 246, 0.1);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 100px;
            transition: 0.3s;
        }

        .boss-card {
            background: var(--card);
            border-radius: 18px;
            border: 1px solid var(--shadow);
            overflow: hidden;
            transition: 0.3s;
        }

        .btn-gold {
            background: var(--accent);
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 12px;
        }

        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--card);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--shadow);
            padding: 12px 20px;
            display: flex;
            justify-content: space-around;
            z-index: 1000;
        }

        .nav-item {
            color: #888;
            font-size: 8px;
            font-weight: 800;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-item.active { color: var(--accent); }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 20000;
            display: flex;
            align-items: center;
                      justify-content: center;
            padding: 20px;
        }

        .hidden { display: none !important; }

        input {
            background: var(--card) !important;
            border: 1px solid var(--shadow) !important;
            border-radius: 12px;
            padding: 12px;
            color: var(--text);
            width: 100%;
            outline: none;
        }

        .cat-scroll {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px 0;
            scrollbar-width: none;
        }
        .cat-item {
            white-space: nowrap;
            font-size: 10px;
            font-weight: 700;
            padding: 8px 15px;
            border-radius: 20px;
            background: var(--card);
        }
        .cat-item.active { background: var(--accent); color: #000; }
        
        .status-badge { font-size: 7px; padding: 2px 6px; border-radius: 4px; background: var(--accent); color: #000; }
    </style>
</head>
<body id="body">

    <!-- Уведомления (Toast) -->
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-yellow-500 text-black px-6 py-2 rounded-full font-black text-[10px] z-[30000] hidden uppercase"></div>

    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <div id="auth-screen" class="p-6 flex flex-col justify-center min-h-screen">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black italic text-yellow-500">BOSS STORE</h1>
            <p class="text-[10px] opacity-50 uppercase tracking-widest">Вход в систему</p>
        </div>
        
        <div id="auth-box" class="space-y-4">
            <input type="text" id="auth-login" placeholder="ЛОГИН ИЛИ EMAIL">
            <input type="password" id="auth-pass" placeholder="ПАРОЛЬ">
            <button onclick="handleAuth('login')" class="w-full btn-gold py-4">ВОЙТИ</button>
            <div class="flex justify-between text-[10px] font-bold opacity-60">
                <span onclick="toggleAuthMode('reg')">РЕГИСТРАЦИЯ</span>
                <span onclick="toggleAuthMode('reset')">ЗАБЫЛИ ПАРОЛЬ?</span>
            </div>
        </div>

        <div id="reg-box" class="space-y-4 hidden">
            <input type="text" id="reg-login" placeholder="ПРИДУМАЙТЕ ЛОГИН">
                        <input type="email" id="reg-email" placeholder="ВАША ПОЧТА">
            <input type="password" id="reg-pass" placeholder="ПАРОЛЬ">
            <button onclick="handleAuth('reg')" class="w-full btn-gold py-4">СОЗДАТЬ АККАУНТ</button>
            <p onclick="toggleAuthMode('login')" class="text-center text-[10px] font-bold opacity-60">ЕСТЬ АККАУНТ? ВОЙТИ</p>
        </div>

        <div id="reset-box" class="space-y-4 hidden">
            <p class="text-[10px] text-center mb-4">ВВЕДИТЕ ПОЧТУ ДЛЯ ВОССТАНОВЛЕНИЯ</p>
            <input type="email" id="reset-email" placeholder="EMAIL">
            <button onclick="handleAuth('reset')" class="w-full btn-gold py-4">ВОССТАНОВИТЬ</button>
            <p onclick="toggleAuthMode('login')" class="text-center text-[10px] font-bold opacity-60">НАЗАД</p>
        </div>
    </div>

    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <main id="app" class="px-4 pt-6 hidden">
        <!-- Контент рендерится через JS -->
    </main>

    <!-- МОДАЛКА ОПЛАТЫ -->
    <div id="m-pay" class="modal hidden">
        <div class="boss-card w-full max-w-sm p-6 text-center">
            <h2 id="p-name" class="text-yellow-500 font-black italic uppercase mb-4 text-xl"></h2>
            <div class="mb-4 text-left">
                <p class="text-[8px] opacity-40 font-black mb-1 uppercase">Выберите количество:</p>
                <input type="number" id="p-qty" value="1" min="1" on input="calcTotal()">
            </div>
            
            <div id="payment-details" class="space-y-2 mb-6 text-left">
                <!-- Реквизиты -->
                <div onclick="copyText('+79501700787')" class="bg-white/5 p-3 rounded-xl border border-white/5">
                    <p class="text-[7px] opacity-40 uppercase">T-Bank / СБП</p>
                    <p class="font-bold text-yellow-500 text-sm">+7 950 170 07 87</p>
                </div>
            </div>

            <div class="flex justify-between items-center mb-6">
                <p class="text-[10px] font-black opacity-40 uppercase">Итого:</p>
                <p id="p-total" class="text-2xl font-black text-yellow-500">0.00 ₽</p>
            </div>

            <div class="flex gap-3">
                <button onclick="closeModal('m-pay')" class="w-1/3 py-4 text-[10px] font-bold opacity-30">НАЗАД</button>
                <button onclick="processOrder()" class="w-2/3 btn-gold py-4 text-[10px]">ОПЛАТИТЬ</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА СООБЩЕНИЙ -->
    <div id="m-msg" class="modal hidden">
        <div class="boss-card w-full max-w-xs p-6 text-center">
            <p id="msg-text" class="text-sm font-bold mb-6"></p>
            <button onclick="closeModal('m-msg')" class="w-full btn-gold py-3 text-[10px]">ОК</button>
        </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <nav id="navbar" class="nav-bar hidden">
        <div onclick="render('shop')" id="n-shop" class="nav-item">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2"/></svg>
            <span>Магазин</span>
        </div>
        <div onclick="render('articles')" id="n-articles" class="nav-item">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l4 4v10a2 2 0 01-2 2z" stroke-width="2"/></svg>
            <span>Статьи</span>
        </div>
        <div onclick="render('game')" id="n-game" class="nav-item">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 012-2h10a2 2 0 012 2v14a2 2 0 01-2 2H7a2 2 0 01-2-2V5z" stroke-width="2"/></svg>
            <span>Игра</span>
        </div>
        <div onclick="render('profile')" id="n-profile" class="nav-item">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"/></svg>
            <span>Профиль</span>
        </div>
        <div onclick="render('more')" id="n-more" class="nav-item">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" stroke-width="2"/></svg>
            <span>Инфо</span>
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const BOT_TOKEN = 'ВСТАВЬ ТОКЕН БОТА';
        const ADMIN_ID = '7727345054';
        const CSV_URL = 'ВСТАВЬ ССЫЛКУ НА CSV ИЗ ГУГЛ ТАБЛИЦЫ';

        // База данных в LocalStorage
        let db = JSON.parse(localStorage.getItem('BOSS_DB')) || {
            users: [], // {login, email, pass, balance, regDate, history: []}
            currentUser: null,
            theme: 'dark',
            vouchers: [
                {code: 'BOSS100', value: 100, used: false},
                {code: 'START', value: 50, used: false}
            ]
        };

        function saveDB() {
            localStorage.setItem('BOSS_DB', JSON.stringify(db));
        }

        // --- ЛОГИКА АВТОРИЗАЦИИ --\
      function toggleAuthMode(mode) {
            document.getElementById('auth-box').classList.add('hidden');
            document.getElementById('reg-box').classList.add('hidden');
            document.getElementById('reset-box').classList.add('hidden');
            document.getElementById(mode + '-box').classList.remove('hidden');
        }

        function handleAuth(type) {
            if (type === 'reg') {
                const login = document.getElementById('reg-login').value;
                const email = document.getElementById('reg-email').value;
                const pass = document.getElementById('reg-pass').value;
                if (!login || !email || !pass) return showMsg('Заполните все поля!');
                
                db.users.push({
                    login, email, pass, 
                    balance: 0, 
                    regDate: new Date().toLocaleDateString(),
                    history: []
                });
                db.currentUser = login;
                showMsg('Регистрация успешна!');
            } else if (type === 'login') {
                const login = document.getElementById('auth-login').value;
                const pass = document.getElementById('auth-pass').value;
                const user = db.users.find(u => (u.login === login || u.email === login) && u.pass === pass);
                if (user) {
                    db.currentUser = user.login;
                } else {
                    return showMsg('Неверные данные!');
                }
            } else if (type === 'reset') {
                showMsg('Инструкция отправлена на почту (симуляция)');
                toggleAuthMode('login');
                return;
            }
            
            saveDB();
            initApp();
        }

        function initApp() {
            if (!db.currentUser) return;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('navbar').classList.remove('hidden');
            applyTheme(db.theme);
            render('shop');
        }

        function applyTheme(theme) {
            db.theme = theme;
            if (theme === 'light') {
                document.getElementById('body').classList.add('light-theme');
            } else {
                document.getElementById('body').classList.remove('light-theme');
            }
            saveDB();
        }

        // --- РЕНДЕР СТРАНИЦ ---
        let products = [];
        let curCat = 'BCE';
        let activeItem = null;

        async function render(page) {
            const app = document.getElementById('app');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            const activeNav = document.getElementById('n-' + page);
            if (activeNav) activeNav.classList.add('active');

            const user = db.users.find(u => u.login === db.currentUser);

            if (page === 'shop') {
                app.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <h1 class="text-xl font-black italic text-yellow-500 uppercase">BOSS STORE</h1>
                        <div class="status-badge">БАЛАНС: ${user.balance} ₽</div>
                    </div>
                    <div class="cat-scroll" id="cat-bar"></div>
                    <div id="grid" class="grid grid-cols-2 gap-4 pb-10"></div>
                `;
                if (products.length === 0) await loadProducts();
                renderCats();
                setCat(curCat);
            } 
            
            else if (page === 'profile') {
                app.innerHTML = `
                    <div class="boss-card p-6 mb-4">
                        <div class="flex justify-between mb-4">
                            <p class="text-[10px] font-black opacity-40 uppercase">Профиль</p>
                            <p class="text-[8px] opacity-40 uppercase">Рег: ${user.regDate}</p>
                        </div>
                        <h2 class="text-xl font-black mb-1">${user.login}</h2>
                        <p class="text-yellow-500 font-bold mb-6">${user.balance} ₽</p>
                        
                        <div class="space-y-2 mb-6">
                            <button onclick="showTopup()" class="w-full btn-gold py-3 text-[10px]">ПОПОЛНИТЬ БАЛАНС</button>
                            <button onclick="applyVoucher()" class="w-full bg-white/5 py-3 text-[10px] rounded-xl font-bold uppercase">АКТИВИРОВАТЬ ВАУЧЕР</button>
                        </div>

                        <div class="border-t border-white/5 pt-4 space-y-4">
                            <p class="text-[8px] font-black opacity-40 uppercase">Настройки</p>
                            <input type="text" id="edit-login" placeholder="Сменить логин" value="${user.login}">
                            <input type="email" id="edit-email" placeholder="Сменить почту" value="${user.email}">
                            <input type="password" id="edit-pass" placeholder="Сменить пароль">
                            <button onclick="updateProfile()" class="w-full btn-gold py-2 text-[8px]">СОХРАНИТЬ</button>
                        </div>
                    </div>

                    <div class="boss-card p-6">
                        <p class="text-[8px] font-black opacity-40 mb-4 uppercase">История покупок</p>
                        <div class="space-y-2 max-h-40 overflow-y-auto">
                            ${user.history.length ? user.history.map(h => `
                                <div class="flex justify-between text-[9px] border-b border-white/5 pb-2">
                                    <span>${h.name} (${h.qty}шт)</span>
                                    <span class="text-yellow-500">${h.price}₽</span>
                                </div>
                            `).join('') : '<p class="text-[10px] opacity-20 italic">Покупок пока нет</p>'}
                        </div>
                    </div>
                    
                    <button onclick="applyTheme(db.theme === 'dark' ? 'light' : 'dark'); render('profile')" class="w-full mt-4 bg-white/5 py-4 rounded-xl text-[10px] font-bold">СМЕНИТЬ ТЕМУ</button>
                    <button onclick="location.reload()" class="w-full mt-2 text-red-500 text-[10px] font-bold">ВЫЙТИ</button>
                `;
            }

            else if (page === 'articles') {
                app.innerHTML = `
                    <h2 class="text-center font-black italic text-yellow-500 mb-6 uppercase">Статьи и новости</h2>
                    <div class="space-y-4">
                        <div class="boss-card p-4">
                            <img src="ВСТАВЬ ССЫЛКУ НА КАРТИНКУ" class="w-full h-32 object-cover rounded-xl mb-3">
                            <h3 class="font-bold text-sm mb-2 text-yellow-500">Обновление Telegram 2026</h3>
                            <p class="text-[10px] opacity-60">ВСТАВЬ ТЕКСТ О НОВОСТЯХ ТЕЛЕГРАМ...</p>
                        </div>
                        <div class="boss-card p-4">
                            <h3 class="font-bold text-sm mb-2 text-yellow-500">Как обезопасить аккаунт?</h3>
                            <p class="text-[10px] opacity-60">ВСТАВЬ ТЕКСТ СОВЕТОВ...</p>
                        </div>
                    </div>
                    `;
            }

            else if (page === 'more') {
                app.innerHTML = `
                    <div class="space-y-3">
                        <div onclick="showPage('FAQ', 'ТЕКСТ FAQ...')" class="boss-card p-5 flex justify-between items-center">
                            <span class="text-sm font-bold uppercase">FAQ - Вопросы</span>
                            <span class="text-yellow-500">→</span>
                        </div>
                        <div onclick="showPage('ОФЕРТА', 'ТЕКСТ ОФЕРТЫ...')" class="boss-card p-5 flex justify-between items-center">
                            <span class="text-sm font-bold uppercase">Оферта</span>
                            <span class="text-yellow-500">→</span>
                        </div>
                        <div onclick="showPage('О НАС', 'ТЕКСТ О НАС...')" class="boss-card p-5 flex justify-between items-center">
                            <span class="text-sm font-bold uppercase">О нас</span>
                            <span class="text-yellow-500">→</span>
                        </div>
                        <div onclick="showPage('ДОВЕРИЕ', 'ПОЧЕМУ НАМ ДОВЕРЯЮТ...')" class="boss-card p-5 flex justify-between items-center">
                            <span class="text-sm font-bold uppercase">Почему мы?</span>
                            <span class="text-yellow-500">→</span>
                        </div>
                        <div class="boss-card p-5">
                            <p class="text-[8px] opacity-40 uppercase mb-2">Техподдержка</p>
                            <p class="font-bold text-sm">email: ВСТАВЬ ПОЧТУ</p>
                            <p class="font-bold text-sm">TG: @nmproda</p>
                        </div>
                    </div>
                `;
            }

            else if (page === 'game') {
                app.innerHTML = `
                    <div class="text-center">
                        <h2 class="text-xl font-black text-yellow-500 italic mb-4 uppercase">Мини-Игра "Ловец"</h2>
                        <div id="game-box" class="boss-card w-full aspect-square relative overflow-hidden flex items-center justify-center">
                            <p class="text-[10px] opacity-40 px-10">Нажимай на появляющиеся значки BOSS!</p>
                            <div id="target" onclick="scoreUp()" class="absolute hidden w-12 h-12 bg-yellow-500 rounded-full flex items-center justify-center text-black font-black">BOSS</div>
                        </div>
                        <p class="mt-4 text-sm font-bold">Счет: <span id="score">0</span></p>
                        <button onclick="startGame()" class="mt-4 btn-gold px-10 py-3 text-[10px]">СТАРТ</button>
                    </div>
                `;
            }
        }

        // --- ФУНКЦИИ МАГАЗИНА ---
        async function loadProducts() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                products = text.split('\n').slice(1).map(row => {
                    const cols = row.split(',');
                    return {
                        cat: cols[0], // A
                        name: cols[1], // B
                        price: parseFloat(cols[2]), // C
                        desc: cols[3], // D
                        img: cols[4], // E
                        stock: parseInt(cols[5]), // F
                        flag: cols[6] // G
                    };
                });
            } catch (e) { showMsg('Ошибка загрузки товаров'); }
        }

        function renderCats() {
            const cats = ['BCE', ...new Set(products.map(p => p.cat))];
            document.getElementById('cat-bar').innerHTML = cats.map(c => `
                <div onclick="setCat('${c}')" class="cat-item ${curCat === c ? 'active' : ''}">${c}</div>
            `).join('');
        }

        function setCat(c) {
            curCat = c;
            renderCats();
            const grid = document.getElementById('grid');
            const filtered = c === 'BCE' ? products : products.filter(p => p.cat === c);
            
            grid.innerHTML = filtered.map(p => `
                <div class="boss-card flex flex-col ${p.stock <= 0 ? 'opacity-40 pointer-events-none' : ''}">
                    <div class="relative">
                        <img src="${p.img || 'https://i.ibb.co/SwV17vtx/IMG-20260502-081255-383.jpg'}" class="w-full aspect-square object-cover">
                        <div class="absolute top-2 left-2 text-lg">${p.flag || '🏳️'}</div>
                    </div>
                    <div class="p-3 flex-1 flex flex-col">
                        <h3 class="text-[10px] font-black text-yellow-500 uppercase mb-1 truncate">${p.name}</h3>
                        <p class="text-[8px] opacity-60 mb-2 line-clamp-2">${p.desc}</p>
                        <div class="mt-auto flex justify-between items-center mb-3">
                            <span class="text-xs font-black">${p.price} ₽</span>
                            <span class="text-[7px] opacity-40 uppercase">${p.stock} шт.</span>
                        </div>
                        <button onclick="openPay('${p.name}', ${p.price}, ${p.stock})" class="w-full btn-gold py-2 text-[9px]">КУПИТЬ</button>
                    </div>
                </div>
            `).join('');
        }

        function openPay(name, price, stock) {
            activeItem = { name, price, stock };
            document.getElementById('p-name').innerText = name;
            document.getElementById('p-qty').max = stock;
            document.getElementById('p-qty').value = 1;
            calcTotal();
            document.getElementById('m-pay').classList.remove('hidden');
        }

        function calcTotal() {
            const qty = parseInt(document.getElementById('p-qty').value) || 1;
            const total = activeItem.price * qty;
            document.getElementById('p-total').innerText = total.toFixed(2) + ' ₽';
        }

        async function processOrder() {
            const qty = parseInt(document.getElementById('p-qty').value);
            const total = activeItem.price * qty;
            const user = db.users.find(u => u.login === db.currentUser);

            // Логика оплаты балансом
            if (user.balance >= total) {
                user.balance -= total;
                user.history.push({ name: activeItem.name, qty, price: total, date: new Date().toLocaleDateString() });
                saveDB();
                showMsg('ОПЛАЧЕНО С БАЛАНСА!');
                closeModal('m-pay');
                render('profile');
                
                // Уведомление в бот
                const text = `✅ НОВЫЙ ЗАКАЗ (БАЛАНС)\n👤 ${user.login}\n📦 ${activeItem.name}\n🔢 Кол-во: ${qty}\n💰 Сумма: ${total}₽`;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(text)}`);
            } else {
                showMsg('НЕДОСТАТОЧНО СРЕДСТВ! ПОПОЛНИТЕ БАЛАНС ИЛИ ОПЛАТИТЕ ПО РЕКВИЗИТАМ.');
            }
        }

        // --- УТИЛИТЫ ---
        function showMsg(t) {
            document.getElementById('msg-text').innerText = t;
            document.getElementById('m-msg').classList.remove('hidden');
        }

        function showPage(title, text) {
            showMsg(`${title}\n\n${text}`);
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        function copyText(t) {
            navigator.clipboard.writeText(t);
            const toast = document.getElementById('toast');
            toast.innerText = 'СКОПИРОВАНО!';
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 1500);
        }

        function applyVoucher() {
            const code = prompt('ВВЕДИТЕ КОД ВАУЧЕРА:');
            if (!code) return;
            const v = db.vouchers.find(x => x.code === code && !x.used);
            if (v) {
                const user = db.users.find(u => u.login === db.currentUser);
                user.balance += v.value;
                v.used = true;
                saveDB();
                showMsg(`АКТИВИРОВАНО! +${v.value} ₽`);
                render('profile');
            } else {
                showMsg('КОД НЕВЕРЕН ИЛИ ИСПОЛЬЗОВАН');
            }
        }

        function updateProfile() {
            const user = db.users.find(u => u.login === db.currentUser);
            user.login = document.getElementById('edit-login').value;
            user.email = document.getElementById('edit-email').value;
            const newPass = document.getElementById('edit-pass').value;
            if (newPass) user.pass = newPass;
            db.currentUser = user.login;
            saveDB();
            showMsg('ДАННЫЕ ОБНОВЛЕНЫ');
            render('profile');
        }

        // --- МИНИ ИГРА ---
        let score = 0;
        function startGame() {
            score = 0;
            document.getElementById('score').innerText = score;
            moveTarget();
        }
        function moveTarget() {
            const t = document.getElementById('target');
            t.classList.remove('hidden');
            t.style.top = Math.random() * 80 + '%';
            t.style.left = Math.random() * 80 + '%';
            setTimeout(() => {
                if(!t.classList.contains('hidden')) moveTarget();
            }, 1000);
        }
        function scoreUp() {
            score++;
            document.getElementById('score').innerText = score;
            document.getElementById('target').classList.add('hidden');
            setTimeout(moveTarget, 100);
        }

        // Инициализация при загрузке
        if (db.currentUser) initApp();
    </script>
</body>
</html>
