<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS HACK | OPERATION REVENGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #bc13fe; --gold: #FFD700; }
        body { background: #050505; color: #fff; font-family: 'JetBrains Mono', monospace; overflow-x: hidden; }
        .neon-border { border: 1px solid var(--neon); box-shadow: 0 0 15px rgba(188, 19, 254, 0.3); }
        .neon-text { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .btn-hack { background: var(--neon); color: #fff; font-weight: 800; transition: 0.3s; }
        .btn-hack:disabled { opacity: 0.3; cursor: not-allowed; }
        .digit-input { width: 45px; height: 60px; background: #111; border: 2px solid #222; border-radius: 8px; text-align: center; font-size: 24px; font-weight: 900; color: var(--gold); outline: none; }
        .digit-input:focus { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .log-box { height: 120px; overflow-y: auto; font-size: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; color: #555; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .scanner { position: absolute; width: 100%; height: 2px; background: var(--neon); box-shadow: 0 0 15px var(--neon); animation: scan 3s linear infinite; z-index: 10; pointer-events: none; }
    </style>
</head>
<body class="p-4">

    <div class="scanner"></div>

    <!-- HEADER -->
    <div class="text-center mb-8 pt-4">
        <h1 class="text-2xl font-black italic italic neon-text uppercase">BOSS HACK</h1>
        <p class="text-[9px] opacity-50 uppercase tracking-widest">System Status: Protected by 128-bit Encryption</p>
    </div>

    <!-- SAFE DISPLAY -->
    <div class="relative max-w-sm mx-auto neon-border bg-[#0d0d0d] p-6 rounded-3xl mb-6">
        <div class="flex justify-between mb-8" id="input-group">
            <input type="number" maxlength="1" class="digit-input" oninput="moveNext(this, 0)">
            <input type="number" maxlength="1" class="digit-input" oninput="moveNext(this, 1)">
            <input type="number" maxlength="1" class="digit-input" oninput="moveNext(this, 2)">
                        <input type="number" maxlength="1" class="digit-input" oninput="moveNext(this, 3)">
            <input type="number" maxlength="1" class="digit-input" oninput="moveNext(this, 4)">
            <input type="number" maxlength="1" class="digit-input" oninput="moveNext(this, 5)">
        </div>

        <button onclick="tryHack()" id="hack-btn" class="w-full btn-hack py-4 rounded-xl uppercase tracking-tighter mb-4">Взломать Сейф</button>
        
        <div class="flex justify-between text-[10px] font-bold uppercase">
            <span>Попытки: <span id="att-count" class="text-white">3</span>/3</span>
            <span id="timer" class="text-yellow-500 hidden">Сброс через 24ч</span>
        </div>
    </div>

    <!-- LOGS -->
    <div class="max-w-sm mx-auto log-box mb-6" id="logs">
        <div>[SYSTEM]: Инициализация протоколов...</div>
        <div>[SYSTEM]: Подключение к BOSS STORE... OK</div>
    </div>

    <!-- AD & PARTNERS -->
    <div class="max-w-sm mx-auto mb-8">
        <h3 class="text-[10px] font-black uppercase text-yellow-500 mb-3 italic">Спонсоры взлома (Подпишись для бонуса):</h3>
        <div class="space-y-2">
            <!-- РЕКЛАМА ТУТ -->
            <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5">
                <span class="text-[10px] font-bold uppercase">BOSS CHANNEL</span>
                <button onclick="openPartner('https://t.me/osnovabossstore')" class="text-[10px] bg-yellow-500 text-black px-3 py-1 rounded-lg font-black">+1 ШАНС</button>
            </div>
             <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5">
                <span class="text-[10px] font-bold uppercase">ADMIN CHAT</span>
                <button onclick="openPartner('https://t.me/nmproda')" class="text-[10px] bg-yellow-500 text-black px-3 py-1 rounded-lg font-black">+1 ШАНС</button>
            </div>
        </div>
    </div>

    <!-- REF SYSTEM -->
    <div class="max-w-sm mx-auto neon-border p-4 rounded-2xl bg-white/5">
        <h3 class="text-[10px] font-black uppercase mb-2 italic">Хакерская сеть (Рефералы):</h3>
                <p class="text-[8px] opacity-50 mb-3 uppercase">За каждого друга — 1 попытка взлома!</p>
        <div class="flex gap-2">
            <input type="text" id="ref-link" readonly class="text-[9px] bg-black border border-white/10 p-2 flex-1 rounded-lg" value="https://boss-hack.ru/?ref=123">
            <button onclick="copyRef()" class="bg-white text-black px-4 py-2 rounded-lg font-black text-[9px] uppercase">Копировать</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // --- НАСТРОЙКИ ДЛЯ БОССА ---
        const BOSS_CODE = "716302"; // МЕНЯЙ КОД ТУТ
        const BOT_TOKEN = "8730430332:AAGff_PCX2059o3EUwG-d9C19uTqcH4sAZ4";
        const ADMIN_ID = "7727345054";
        // ---------------------------

        let state = JSON.parse(localStorage.getItem('BOSS_HACK_STATE')) || {
            attempts: 3,
            lastReset: Date.now(),
            totalHacks: 0
        };

        function moveNext(el, idx) {
            if(el.value.length > 1) el.value = el.value.slice(0,1);
            if(el.value !== "" && idx < 5) {
                document.querySelectorAll('.digit-input')[idx+1].focus();
            }
        }

        function addLog(msg) {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            div.innerText = `[${new Date().toLocaleTimeString()}]: ${msg}`;
            logs.prepend(div);
        }

        async function tryHack() {
            if(state.attempts <= 0) {
                addLog("ОШИБКА: Нет энергии для взлома!");
                return;
            }

            const inputs = document.querySelectorAll('.digit-input');
            let code = "";
            inputs.forEach(i => code += i.value);

            if(code.length < 6) {
                addLog("ОШИБКА: Введите 6 цифр!");
                return;
            }

            state.attempts--;
            save();
            updateUI();

            addLog(`Инициализация взлома кода ${code}...`);
            
            // Реалистичная задержка
            const btn = document.getElementById('hack-btn');
            btn.disabled = true;
            btn.innerText = "DECRYPTING...";

            setTimeout(async () => {
                if(code === BOSS_CODE) {
                    addLog("ДОСТУП РАЗРЕШЕН! СЕЙФ ОТКРЫТ!");
                    tg.HapticFeedback.notificationOccurred('success');
                    alert("ВЫ ВЗЛОМАЛИ СЕЙФ! СКРИНШОТ В ЛС АДМИНУ!");
                    
                    // Уведомление Боссу
                    const user = tg.initDataUnsafe.user || {id: 0, username: 'unknown'};
                    const msg = `💎 КТО-ТО ВЗЛОМАЛ СЕЙФ! 💎\nКод: ${code}\nЮзер: @${user.username}\nID: ${user.id}`;
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(msg)}`);
                } else {
                    addLog("ОШИБКА: Неверный код. Система заблокирована.");
                    tg.HapticFeedback.notificationOccurred('error');
                    inputs.forEach(i => i.value = "");
                    inputs[0].focus();
                }
                btn.disabled = false;
                btn.innerText = "Взломать Сейф";
            }, 2000);
        }

        function openPartner(link) {
            window.open(link);
            addLog("Проверка подписки... Шанс добавлен!");
            state.attempts++;
            save();
            updateUI();
        }

        function updateUI() {
            document.getElementById('att-count').innerText = state.attempts;
            // Сброс через 24 часа
            const now = Date.now();
            if(now - state.lastReset > 86400000) {
                state.attempts = 3;
                state.lastReset = now;
                save();
            }
            // Генерация реф ссылки
            const user = tg.initDataUnsafe.user || {id: 'guest'};
            document.getElementById('ref-link').value = `https://t.me/Boss_storesvzbot?start=ref_${user.id}`;
        }

        function copyRef() {
            const input = document.getElementById('ref-link');
            input.select();
            document.execCommand('copy');
            tg.HapticFeedback.impactOccurred('medium');
            alert("Ссылка скопирована!");
        }

        function save() { localStorage.setItem('BOSS_HACK_STATE', JSON.stringify(state)); }
        
        updateUI();
        addLog("Система готова к дешифровке.");
    </script>
</body>
</html>
