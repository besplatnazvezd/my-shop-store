<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS CRYPTO PUMP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; margin: 0; padding-bottom: 100px; }
        .boss-card { background: #0d0d0d; border: 1px solid rgba(255,215,0,0.1); border-radius: 20px; }
        .btn-gold { background: linear-gradient(180deg, #FFD700 0%, #BA8B02 100%); color: #000; font-weight: 900; border-radius: 12px; }
        
        /* Белое окно графика */
        .graph-window { background: #fff; border-radius: 15px; height: 220px; position: relative; overflow: hidden; }
        
        input { background: #1a1a1a !important; border: 1px solid #333 !important; border-radius: 10px; padding: 10px; color: #fff; width: 100%; outline: none; font-size: 13px; }
        input::placeholder { color: #555; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #050505; border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 15px 0 30px; z-index: 1000; }
        .nav-item { font-size: 10px; font-weight: 900; color: #444; text-transform: uppercase; cursor: pointer; }
        .nav-item.active { color: #FFD700; }
        
        .coin-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #222; }
        .price-up { color: #00c853; }
        .price-down { color: #ff3d00; }
    </style>
</head>
<body>

    <!-- Шапка профиля -->
    <div class="p-4 flex justify-between items-end">
        <div>
            <p class="text-[10px] opacity-40 uppercase font-black">Доступный баланс</p>
            <h1 id="balance" class="text-2xl font-black text-yellow-500">0.00 ₽</h1>
        </div>
        <div class="text-right">
            <p id="username" class="text-xs font-bold">@guest</p>
            <p id="userid" class="text-[9px] opacity-30">ID: 000000</p>
        </div>
    </div>

    <main id="app" class="px-4"></main>

    <nav class="nav-bar">
        <div onclick="render('create')" id="n-create" class="nav-item">Создать</div>
                <div onclick="render('buy')" id="n-buy" class="nav-item active">Купить</div>
        <div onclick="render('sell')" id="n-sell" class="nav-item">Продать</div>
        <div onclick="render('profile')" id="n-profile" class="nav-item">Профиль</div>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    const ADMIN_ID = "7727345054";

    // Состояние игры
    let state = JSON.parse(localStorage.getItem('BOSS_CRYPTO_DATA')) || {
        balance: 1000,
        myCoins: {}, // { ticker: amount }
        createdCoins: [], 
        allCoins: [
            { name: "Bitcoin", ticker: "BTC", price: 65000, supply: 21000000, avatar: "https://cryptologos.cc/logos/bitcoin-btc-logo.png", history: [64000, 65000, 64500, 65500, 65000] },
            { name: "Solana", ticker: "SOL", price: 140, supply: 500000000, avatar: "https://cryptologos.cc/logos/solana-sol-logo.png", history: [130, 135, 145, 140, 142] }
        ],
        history: []
    };

    // --- ЛОГИКА АДМИНА ---
    const user = tg.initDataUnsafe?.user || { id: "7727345054", username: "nmproda" }; // Для теста подставил твой ID
    if (String(user.id) === ADMIN_ID) {
        state.balance = 1000000; // Ровно лям каждый раз
    }

    let selectedTicker = state.allCoins[0].ticker;

    function save() {
        localStorage.setItem('BOSS_CRYPTO_DATA', JSON.stringify(state));
        document.getElementById('balance').innerText = state.balance.toLocaleString() + ' ₽';
    }

    function render(page) {
        const app = document.getElementById('app');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('n-' + page).classList.add('active');

        if (page === 'create') {
            app.innerHTML = `
                <div class="boss-card p-5 space-y-3">
                    <h2 class="text-center font-black text-yellow-500 uppercase italic">Запуск новой монеты</h2>
                    <input type="text" id="c-name" placeholder="Название монеты (напр. Boss Token)">
                    <input type="text" id="c-ticker" placeholder="Тикер (напр. BOSS)">
                    <input type="number" id="c-invest" placeholder="Сумма вложений (₽)">
                                        <input type="number" id="c-supply" placeholder="Эмиссия (сколько выпустить шт)">
                    <input type="number" id="c-price" placeholder="Начальная цена (₽)">
                    <input type="text" id="c-avatar" placeholder="URL аватарки (ссылка на картинку)">
                    <button onclick="processCreate()" class="btn-gold w-full py-4 mt-2 text-xs">ОПЛАТИТЬ И СОЗДАТЬ</button>
                </div>`;
        }

        if (page === 'buy') {
            const coin = state.allCoins.find(c => c.ticker === selectedTicker);
            app.innerHTML = `
                <div class="graph-window mb-4">
                    <canvas id="chartCanvas"></canvas>
                </div>
                <div class="flex gap-2 overflow-x-auto pb-4">
                    ${state.allCoins.map(c => `
                        <div onclick="selectCoin('${c.ticker}')" class="boss-card p-3 min-w-[100px] text-center ${selectedTicker === c.ticker ? 'border-yellow-500' : ''}">
                            <img src="${c.avatar}" class="w-8 h-8 mx-auto rounded-full mb-1">
                            <p class="text-[10px] font-black">${c.ticker}</p>
                            <p class="text-[9px] text-yellow-500">${c.price.toFixed(2)}₽</p>
                        </div>
                    `).join('')}
                </div>
                <div class="boss-card p-5">
                    <div class="flex justify-between mb-4">
                        <spanclass="font-black">${coin.name}</span>
                        <span class="font-black text-yellow-500">${coin.price.toFixed(4)} ₽</span>
                    </div>
                    <input type="number" id="buy-sum" placeholder="Сумма покупки (₽)" class="mb-3">
                    <button onclick="processBuy()" class="btn-gold w-full py-4 text-xs">КУПИТЬ МОНЕТУ</button>
                </div>`;
            drawChart(coin.history);
        }

        if (page === 'sell') {
            const myTickers = Object.keys(state.myCoins);
            app.innerHTML = `
                <h2 class="text-[10px] opacity-40 font-black mb-4 uppercase">Ваши активы</h2>
                ${myTickers.length === 0 ? '<p class="text-center py-10 opacity-20">У вас пока нет монет</p>' : 
                myTickers.map(t => {
                    const coin = state.allCoins.find(c => c.ticker === t);
                    const amount = state.myCoins[t];
                    const value = amount * (coin ? coin.price : 0);
                    return `
                        <div class="boss-card p-4 flex justify-between items-center mb-2">
                            <div class="flex items-center gap-3">
                                <img src="${coin?.avatar}" class="w-10 h-10 rounded-full">
                                <div><p class="font-black">${t}</p><p class="text-[10px] opacity-40">${amount.toFixed(2)} шт.</p></div>
                            </div>
                            <div class="text-right">
                                <p class="font-black text-yellow-500">${value.toFixed(2)} ₽</p>
                                <button onclick="processSell('${t}')" class="text-[8px] font-black text-red-500 uppercase mt-1">Продать всё</button>
                            </div>
                        </div>`;
                }).join('')}`;
        }

        if (page === 'profile') {
            const totalProfit = state.history.reduce((acc, curr) => acc + (curr.type === 'SELL' ? curr.profit : 0), 0);
            app.innerHTML = `
                <div class="boss-card p-6 mb-4 text-center">
                    <p class="text-[10px] opacity-40 uppercase font-black">Ваша прибыль</p>
                    <h2 class="text-3xl font-black ${totalProfit >= 0 ? 'text-green-500' : 'text-red-500'}">${totalProfit.toFixed(2)} ₽</h2>
                </div>
                <div class="space-y-2">
                    <p class="text-[10px] opacity-40 font-black uppercase">Последние сделки</p>
                    ${state.history.slice(-5).reverse().map(h => `
                        <div class="boss-card p-3 flex justify-between text-[10px]">
                            <span class="${h.type === 'BUY' ? 'text-green-500' : 'text-yellow-500'} font-black">${h.type}</span>
                            <span class="font-bold">${h.ticker}</span>
                            <span class="opacity-40">${h.sum} ₽</span>
                        </div>
                    `).join('')}
                </div>`;
        }
        save();
    }

    // --- ФУНКЦИИ МОТОРЫ ---

    function selectCoin(t) { selectedTicker = t; render('buy'); }

    function processCreate() {
        const name = document.getElementById('c-name').value;
        const ticker = document.getElementById('c-ticker').value.toUpperCase();
        const invest = parseFloat(document.getElementById('c-invest').value);
        const supply = parseFloat(document.getElementById('c-supply').value);
        const price = parseFloat(document.getElementById('c-price').value);
        const avatar = document.getElementById('c-avatar').value || "https://cdn-icons-png.flaticon.com/512/2585/2585141.png";

        if (!name || !ticker || !invest || !supply || !price) return alert("Заполните все поля!");
        if (state.balance < invest) return alert("Недостаточно баланса!");

        state.balance -= invest;
        const newCoin = { name, ticker, price, supply, avatar, history: [price * 0.9, price] };
        state.allCoins.push(newCoin);
        state.myCoins[ticker] = (state.myCoins[ticker] || 0) + (invest / price);
        state.createdCoins.push(ticker);
        state.history.push({ type: 'CREATE', ticker, sum: invest, date: Date.now() });

        alert("Монета успешно создана!");
        render('buy');
    }

    function processBuy() {
        const sum = parseFloat(document.getElementById('buy-sum').value);
        const coin = state.allCoins.find(c => c.ticker === selectedTicker);
        if (!sum || state.balance < sum) return alert("Ошибка баланса!");

        const amount = sum / coin.price;
        state.balance -= sum;
        state.myCoins[selectedTicker] = (state.myCoins[selectedTicker] || 0) + amount;
        
        // Pump effect (Цена растет при покупке)
        coin.price *= 1.05;
        coin.history.push(coin.price);
        
        state.history.push({ type: 'BUY', ticker: selectedTicker, sum: sum, date: Date.now() });
        render('buy');
    }

    function processSell(t) {
        const coin = state.allCoins.find(c => c.ticker === t);
        const amount = state.myCoins[t];
        const sum = amount * coin.price;

        state.balance += sum;
        delete state.myCoins[t];
        
        // Dump effect (Цена падает при продаже)
        coin.price *= 0.90;
        coin.history.push(coin.price);

        state.history.push({ type: 'SELL', ticker: t, sum: sum.toFixed(2), profit: sum, date: Date.now() });
        render('sell');
    }

    function drawChart(history) {
        const canvas = document.getElementById('chartCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        const max = Math.max(...history) * 1.05;
        const min = Math.min(...history) * 0.95;
        const range = max - min;
        const stepX = canvas.width / (history.length - 1);

        ctx.beginPath();
        ctx.strokeStyle = history[history.length-1] >= history[0] ? '#00c853' : '#ff3d00';
        ctx.lineWidth = 4;
        
        history.forEach((p, i) => {
            const x = i * stepX;
            const y = canvas.height - ((p - min) / range) * canvas.height;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }

    // Симуляция ботов (рынок дышит)
    setInterval(() => {
        state.allCoins.forEach(c => {
            const volatility = (Math.random() - 0.5) * 0.02; // +/- 1%
            c.price *= (1 + volatility);
            c.history.push(c.price);
            if (c.history.length > 20) c.history.shift();
        });
        if (document.getElementById('chartCanvas')) {
            const coin = state.allCoins.find(c => c.ticker === selectedTicker);
            drawChart(coin.history);
        }
    }, 5000);

    // Старт
    document.getElementById('username').innerText = '@' + user.username;
    document.getElementById('userid').innerText = 'ID: ' + user.id;
    render('buy');
</script>
</body>
</html>
