<script>
    fetch('data.json?' + new Date().getTime())
        .then(res => {
            if (!res.ok) throw new Error("Файл данных не найден");
            return res.json();
        })
        .then(data => {
            const container = document.getElementById('shop');
            if (data.length === 0) {
                container.innerHTML = "<h1 style='color:black;'>Товары загружаются или их нет в наличии. Проверьте позже!</h1>";
                return;
            }
            data.forEach(item => {
                container.innerHTML += `
                    <div class="card">
                        <div class="name">${item.name}</div>
                        <div class="stock">В наличии: ${item.stock} шт.</div>
                        <div class="price">${item.price}</div>
                        <a href="https://t.me/ТВОЙ_НИК" class="btn">Купить</a>
                    </div>
                `;
            });
        })
        .catch(err => {
            document.getElementById('shop').innerHTML = "<h1 style='color:red;'>Ошибка загрузки данных: " + err.message + "</h1>";
        });
</script>
