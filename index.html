<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS COIN V6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #bc13fe; --gold: #FFD700; --bg: #030303; }
        body { background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; margin: 0; user-select: none; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* График */
        canvas { width: 100%; height: 150px; background: rgba(255,255,255,0.02); border-radius: 15px; }

        .neon-border { border: 1px solid var(--neon); box-shadow: 0 0 10px rgba(188, 19, 254, 0.3); }
        .tab-btn { flex: 1; padding: 12px; font-size: 10px; text-align: center; opacity: 0.4; transition: 0.3s; border-bottom: 2px solid transparent; }
        .tab-btn.active { opacity: 1; color: var(--neon); border-bottom-color: var(--neon); }

        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; transition: 0.3s; }
        .card:active { transform: scale(0.97); }

        .verifying { animation: pulse 1s infinite; pointer-events: none; opacity: 0.5; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Кастомный скролл */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <div class="sticky top-0 z-50 bg-[#030303] p-4 border-b border-white/5 flex justify-between items-center">
        <div>
            <p class="text-[10px] opacity-50 uppercase">Ваш Баланс:</p>
            <div class="flex items-center gap-2">
                <span id="bal-boss" class="orbitron text-xl font-black text-purple-500">0</span>
                <span class="text-[10px] text-purple-400">BOSS</span>
            </div>
        </div>
        <div class="text-right">
            <p id="bal-rub" class="orbitron text-lg font-black text-yellow-500">0.00 ₽</p>
            <p class="text-[8px] opacity-40 uppercase">Личный счет</p>
        </div>
    </div>

    <!-- КОНТЕНТ -->
    <div class="p-4 pb-24">
        
        <!-- ТАБЫ -->
                <div class="flex mb-6 bg-white/5 rounded-xl overflow-hidden">
            <button onclick="showTab('trade')" id="btn-trade" class="tab-btn active uppercase">Биржа</button>
            <button onclick="showTab('mine')" id="btn-mine" class="tab-btn uppercase">Майнинг</button>
            <button onclick="showTab('shop')" id="btn-shop" class="tab-btn uppercase">Рынок</button>
            <button onclick="showTab('profile')" id="btn-profile" class="tab-btn uppercase">Профиль</button>
        </div>

        <!-- ТАБ: БИРЖА -->
        <div id="tab-trade">
            <div class="text-center mb-4">
                <p class="text-[10px] opacity-50 mb-1 uppercase">Текущий курс BOSS Coin:</p>
                <div id="current-price" class="orbitron text-3xl font-black text-white">24.39 ₽</div>
                <p id="price-change" class="text-[10px] text-green-500">+2.41%</p>
            </div>
            <canvas id="chart"></canvas>
            
            <div class="flex gap-4 mt-6">
                <button onclick="trade('buy')" class="flex-1 bg-green-600/20 border border-green-500 text-green-500 py-4 rounded-xl orbitron font-black uppercase">Купить</button>
                <button onclick="trade('sell')" class="flex-1 bg-red-600/20 border border-red-500 text-red-500 py-4 rounded-xl orbitron font-black uppercase">Продать</button>
            </div>
        </div>

        <!-- ТАБ: МАЙНИНГ -->
        <div id="tab-mine" class="hidden">
            <div class="mb-4 p-4 card neon-border">
                <p class="text-xs uppercase font-bold text-purple-400 mb-1">Ферма активна</p>
                <p class="text-[10px] opacity-60">Подписывайся на каналы партнеров, чтобы получать BOSS монеты.</p>
            </div>
            <div class="grid grid-cols-2 gap-3" id="channels-grid"></div>
        </div>

        <!-- ТАБ: РЫНОК -->
        <div id="tab-shop" class="hidden">
            <h3 class="orbitron text-sm mb-4 uppercase text-yellow-500">Luxury Assets</h3>
            <div class="grid grid-cols-2 gap-3" id="shop-grid"></div>
        </div>

        <!-- ТАБ: ПРОФИЛЬ -->
        <div id="tab-profile" class="hidden">
            <div class="card p-6 text-center mb-6">
                                <div class="w-20 h-20 bg-purple-600 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl shadow-lg shadow-purple-500/20" id="user-avatar">👑</div>
                <h2 id="user-name" class="orbitron font-black text-xl mb-1">BOSS_USER</h2>
                <p class="text-[10px] text-purple-400 uppercase tracking-widest" id="user-rank">Новичок</p>
            </div>
            <h3 class="text-[10px] opacity-40 uppercase mb-3">Ваше имущество:</h3>
            <div id="inventory-list" class="space-y-2"></div>
        </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // ДАННЫЕ
        let state = JSON.parse(localStorage.getItem('BOSS_COIN_V6')) || {
            boss: 0, rub: 0, items: [], lastD: new Date().toDateString()
        };

        let price = 24.39;
        let history = [22, 23, 24, 23.5, 24.39];
        const ADMIN_ID = "7727345054";
        const BOT_TOKEN = "8730430332:AAGff_PCX2059o3EUwG-d9C19uTqcH4sAZ4";

        const SHOP_ITEMS = [
            { id: 1, n: "Кроссовки Gucci", p: 5, i: "👟", cat: "Стиль" },
            { id: 2, n: "Rolex Daytona", p: 15, i: "⌚", cat: "Аксессуары" },
            { id: 3, n: "Игровой ПК", p: 30, i: "🖥", cat: "Техника" },
            { id: 4, n: "BMW M5", p: 120, i: "🚗", cat: "Авто" },
            { id: 5, n: "Ferrari Pista", p: 450, i: "🏎", cat: "Авто" },
            { id: 6, n: "Квартира в Сити", p: 800, i: "🏢", cat: "Дом" },
            { id: 7, n: "Вилла на Бали", p: 2500, i: "🏝", cat: "Дом" },
            { id: 8, n: "Частный Джет", p: 6000, i: "🛩", cat: "Транспорт" },
            { id: 9, n: "Золотой Скин", p: 100, i: "✨", cat: "Скин" },
            { id: 10, n: "Маска Анонима", p: 50, i: "🎭", cat: "Скин" },
            { id: 11, n: "Личный Остров", p: 15000, i: "🌋", cat: "Дом" },
            { id: 12, n: "Статус БОССА", p: 50000, i: "👑", cat: "Статус" }
        ];

        // ГРАФИК
        function drawChart() {
            const canvas = document.getElementById('chart');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.beginPath();
            ctx.strokeStyle = '#bc13fe';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#bc13fe';
            
            const step = canvas.width / (history.length - 1);
            const max = Math.max(...history) * 1.1;
            const min = Math.min(...history) * 0.9;
            
            history.forEach((p, i) => {
                const x = i * step;
                const y = canvas.height - ((p - min) / (max - min)) * canvas.height;
                if(i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        // ОБНОВЛЕНИЕ ЦЕНЫ
        setInterval(() => {
            const change = (Math.random() - 0.5) * 2;
            price = Math.max(5, price + change);
            history.push(price);
            if(history.length > 20) history.shift();
            
            document.getElementById('current-price').innerText = price.toFixed(2) + " ₽";
            const pc = document.getElementById('price-change');
            pc.innerText = (change >= 0 ? "+" : "") + change.toFixed(2) + "%";
            pc.className = change >= 0 ? "text-green-500 text-[10px]" : "text-red-500 text-[10px]";
            
            drawChart();
        }, 3000);

        // ТОРГОВЛЯ
        function trade(type) {
            if(type === 'buy') {
                const amount = prompt("Сколько BOSS купить?");
                const cost = amount * price;
                if(state.rub >= cost) {
                    state.rub -= cost;
                    state.boss += Number(amount);
                    save(); updateUI();
                } else alert("Недостаточно рублей!");
            } else {
                if(state.boss > 0) {
                    const amount = prompt("Сколько BOSS продать?", state.boss);
                    if(amount <= state.boss) {
                        state.rub += amount * price;
                        state.boss -= Number(amount);
                        save(); updateUI();
                    }
                }
            }
        }

        // КАНАЛЫ (20 штук)
        const mineGrid = document.getElementById('channels-grid');
        for(let i=1; i<=20; i++) {
            mineGrid.innerHTML += `
                <div id="chan-${i}" onclick="mine(${i})" class="card p-4 text-center">
                    <p class="text-[10px] text-purple-400 font-bold uppercase">Node #${i}</p>
                    <p id="st-${i}" class="text-[7px] opacity-40 uppercase">Майнить 1 BOSS</p>
                </div>
            `;
        }

        function mine(id) {
            window.open("https://t.me/osnovabossstore");
            const btn = document.getElementById(`chan-${id}`);
            const st = document.getElementById(`st-${id}`);
            btn.classList.add('verifying');
            st.innerText = "ПРОВЕРКА...";
            
            setTimeout(() => {
                btn.classList.remove('verifying');
                btn.style.opacity = "0.3";
                st.innerText = "ДОБЫТО ✓";
                state.boss += 1;
                save(); updateUI();
                tg.HapticFeedback.notificationOccurred('success');
            }, 8000);
        }

        // МАГАЗИН
        const shopGrid = document.getElementById('shop-grid');
        SHOP_ITEMS.forEach(item => {
            shopGrid.innerHTML += `
                <div onclick="buyItem(${item.id})" class="card p-4 relative">
                    <div class="text-3xl mb-2">${item.i}</div>
                    <p class="text-[10px] font-bold uppercase truncate">${item.n}</p>
                    <p class="text-[9px] text-yellow-500 orbitron">${item.p} BOSS</p>
                    <div class="text-[6px] opacity-30 mt-1">${item.cat}</div>
                </div>
            `;
        });

        function buyItem(id) {
            const item = SHOP_ITEMS.find(x => x.id === id);
            if(state.boss >= item.p) {
                state.boss -= item.p;
                state.items.push(item);
                save(); updateUI();
                alert(`Поздравляем! Вы купили ${item.n}!`);
                
                // Уведомление админу
                const user = tg.initDataUnsafe.user || {username: 'anon'};
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent("🛍 ПОКУПКА: @"+user.username+" купил "+item.n)}`);
            } else alert("Мало BOSS монет!");
        }

        // ИНТЕРФЕЙС
        function showTab(t) {
            ['trade', 'mine', 'shop', 'profile'].forEach(id => {
                document.getElementById(`tab-${id}`).classList.toggle('hidden', id !== t);
                document.getElementById(`btn-${id}`).classList.toggle('active', id === t);
            });
        }

        function updateUI() {
            document.getElementById('bal-boss').innerText = Math.floor(state.boss);
            document.getElementById('bal-rub').innerText = state.rub.toFixed(2) + " ₽";
            
            const inv = document.getElementById('inventory-list');
            inv.innerHTML = "";
            state.items.forEach(it => {
                inv.innerHTML += `<div class="card p-3 flex justify-between items-center text-[10px] uppercase font-bold">
                    <span>${it.i} ${it.n}</span> <span class="text-green-500">Владелец</span>
                </div>`;
            });

            const user = tg.initDataUnsafe.user || {first_name: 'Boss Player'};
            document.getElementById('user-name').innerText = user.first_name;
            
            // Ранг
            let rank = "Новичок";
            if(state.items.length > 3) rank = "Местный Хайп";
            if(state.items.length > 7) rank = "Крипто-Магнат";
            if(state.items.find(x => x.id === 12)) rank = "ГЛАВНЫЙ БОСС";
            document.getElementById('user-rank').innerText = rank;
        }

        function save() { localStorage.setItem('BOSS_COIN_V6', JSON.stringify(state)); }
        
        window.onload = () => {
            updateUI();
            drawChart();
        }
    </script>
</body>
</html>
