    <style>
        :root { --neon: #00ff88; --accent: #bc13fe; --gold: #ffcc00; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        .sync { font-family: 'Syncopate', sans-serif; }
        
        /* ГЛАВНЫЙ КРИСТАЛЛ */
        #core-container { position: relative; height: 320px; display: flex; align-items: center; justify-content: center; perspective: 1000px; }
        #main-orb {
            width: 180px; height: 180px; background: radial-gradient(circle, var(--neon) 0%, transparent 70%);
            border-radius: 50%; filter: blur(15px); animation: pulse 3s infinite; position: absolute;
        }
        #main-crystal {
            width: 100px; height: 100px; background: #fff; transform: rotateX(45deg) rotateY(45deg);
            box-shadow: 0 0 50px var(--neon), inset 0 0 20px var(--neon); transition: 0.1s; z-index: 10;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.2); } }

        /* ИНТЕРФЕЙС */
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.07); border-radius: 24px; backdrop-filter: blur(10px); }
        .btn-action { background: linear-gradient(90deg, var(--neon), var(--accent)); color: #000; font-weight: 900; border-radius: 16px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-action:active { transform: scale(0.95); filter: brightness(1.2); }

        /* КАНАЛЫ */
        .node-card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 12px; border-radius: 18px; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .node-card.locked { opacity: 0.4; filter: grayscale(1); }
        .node-card.active { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 255, 136, 0.1); }

        /* АНИМАЦИЯ ВЫЛЕТАЮЩИХ ЦИФР */
                .coin-pop { position: absolute; color: var(--neon); font-weight: 900; pointer-events: none; animation: floatUp 0.8s ease-out forwards; z-index: 100; }
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-100px); } }

        .tab-content { display: none; height: calc(100vh - 180px); overflow-y: auto; padding-bottom: 80px; }
        .tab-content.active { display: block; }
        
        .nav-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 65px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
    </style>
</head>

<body class="p-5">

    <!-- TOP HEADER -->
    <div class="flex justify-between items-start mb-5">
        <div>
            <h1 class="sync text-[10px] text-zinc-500 tracking-[4px] uppercase mb-1">Neural Balance</h1>
            <div class="flex items-baseline gap-2">
                <span id="boss-bal" class="sync text-3xl font-bold tracking-tighter text-white">0</span>
                <span class="text-xs text-[#00ff88] font-black uppercase">Coins</span>
            </div>
        </div>
        <div class="text-right">
            <div id="rub-bal" class="sync text-xl font-bold text-white">0.00 ₽</div>
            <div id="hashrate" class="text-[8px] text-zinc-500 uppercase tracking-widest mt-1">Speed: 0.00 H/s</div>
        </div>
    </div>

    <!-- TAB 1: CORE -->
    <div id="tab-core" class="tab-content active">
        <div id="core-container" onclick="tap(event)">
            <div id="main-orb"></div>
            <div id="main-crystal"></div>
        </div>
        
        <div class="glass p-6 text-center">
            <p id="status-text" class="text-[10px] uppercase tracking-[3px] text-zinc-400 mb-4">Система стабильна. Жми на ядро.</p>
            <div class="flex justify-around items-center">
                <div>
                    <p class="text-[9px] uppercase text-zinc-500 mb-1">Multiplier</p>
                    <p class="sync text-sm" id="multi">x1.0</p>
                </div>
                <div class="h-10 w-[1px] bg-white/10"></div>
                <div>
                    <p class="text-[9px] uppercase text-zinc-500 mb-1">Upgrades</p>
                    <p class="sync text-sm" id="up-count">0/12</p>
                </div>
            </div>
        </div>
    </div>

    <!-- TAB 2: NETWORK (NODES) -->
    <div id="tab-network" class="tab-content">
        <h2 class="sync text-xs mb-6 tracking-widest text-zinc-400 uppercase">External Proxy Nodes</h2>
        <div class="grid gap-3" id="nodes-list"></div>
    </div>

    <!-- TAB 3: MARKET -->
    <div id="tab-market" class="tab-content">
        <h2 class="sync text-xs mb-6 tracking-widest text-zinc-400 uppercase">Hardware Market</h2>
        <div class="grid gap-4" id="market-list"></div>
    </div>

    <!-- NAVIGATION -->
    <div class="nav-bar glass p-2">
        <button onclick="showTab('core')" class="flex-1 flex flex-col items-center opacity-40 active-nav" id="n-core">
            <span class="text-xl">💎</span>
            <span class="text-[7px] uppercase font-bold mt-1">Core</span>
        </button>
        <button onclick="showTab('network')" class="flex-1 flex flex-col items-center opacity-40" id="n-network">
            <span class="text-xl">📡</span>
            <span class="text-[7px] uppercase font-bold mt-1">Network</span>
        </button>
        <button onclick="showTab('market')" class="flex-1 flex flex-col items-center opacity-40" id="n-market">
            <span class="text-xl">📦</span>
            <span class="text-[7px] uppercase font-bold mt-1">Market</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        tg.headerColor = '#000000';

        let state = JSON.parse(localStorage.getItem('BOSS_NEURAL_V1')) || {
            boss: 0, rub: 0, multi: 1, upgrades: 0, lastCheck: Date.now(), items: [], subs: {}
        };

        const HARDWARE = [
            { id: 1, n: 'S-Node v1', p: 100, i: '⚡', d: 'Авто-добыча: 0.1/сек' },
            { id: 2, n: 'G-GPU 3090', p: 500, i: '🔥', d: 'Множитель клика: x2' },
            { id: 3, n: 'Neural Link', p: 2500, i: '🧠', d: 'Пассивный доход: 5/сек' },
            { id: 4, n: 'Quantum Cell', p: 10000, i: '🌀', d: 'Валюта RUB: +1/мин' }
        ];

        // КЛИК
        function tap(e) {
            const val = 1 * state.multi;
            state.boss += val;
            
            // FX
            const crystal = document.getElementById('main-crystal');
            crystal.style.transform = `rotateX(45deg) rotateY(45deg) scale(0.9)`;
            setTimeout(() => crystal.style.transform = `rotateX(45deg) rotateY(45deg) scale(1)`, 50);

            const pop = document.createElement('div');
            pop.className = 'coin-pop sync';
            pop.innerText = `+${val}`;
            pop.style.left = e.pageX + 'px';
            pop.style.top = e.pageY + 'px';
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 800);
            
            tg.HapticFeedback.impactOccurred('medium');
            save(); updateUI();
        }

        // ТАБЫ
        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-bar button').forEach(b => b.classList.add('opacity-40'));
            document.getElementById(`tab-${t}`).classList.add('active');
            document.getElementById(`n-${t}`).classList.remove('opacity-40');
            if(t === 'network') renderNodes();
            if(t === 'market') renderMarket();
        }

        // КАНАЛЫ (NODES)
        function renderNodes() {
            const list = document.getElementById('nodes-list');
            list.innerHTML = "";
            for(let i=1; i<=20; i++) {
                const isSub = state.subs[i];
                list.innerHTML += `
                    <div onclick="openNode(${i})" class="node-card ${isSub ? 'active' : ''}">
                        <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center sync text-[10px]">#${i}</div>
                        <div class="flex-1">
                            <p class="text-[10px] font-bold uppercase">Proxy Node Access</p>
                            <p class="text-[8px] text-zinc-500 uppercase">${isSub ? 'Connected ✓' : 'Click to Establish Connection'}</p>
                        </div>
                        <div class="text-[10px] font-bold text-[#00ff88]">+100 BOSS</div>
                    </div>
                `;
            }
        }

        function openNode(id) {
            window.open("https://t.me/osnovabossstore"); // Замени на свои
            setTimeout(() => {
                if(!state.subs[id]) {
                    state.boss += 100;
                    state.subs[id] = Date.now();
                    save(); updateUI(); renderNodes();
                    tg.HapticFeedback.notificationOccurred('success');
                }
            }, 5000);
        }

        // МАРКЕТ
        function renderMarket() {
            const list = document.getElementById('market-list');
            list.innerHTML = "";
            HARDWARE.forEach(h => {
                list.innerHTML += `
                <div onclick="buyHardware(${h.id})" class="glass p-4 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl">${h.i}</span>
                            <div>
                                <p class="text-[10px] font-black uppercase">${h.n}</p>
                                <p class="text-[8px] text-zinc-500">${h.d}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="sync text-[10px] font-bold">${h.p}</p>
                            <p class="text-[7px] text-zinc-500 uppercase">Coins</p>
                        </div>
                    </div>
                `;
            });
        }

        function buyHardware(id) {
            const h = HARDWARE.find(x => x.id === id);
            if(state.boss >= h.p) {
                state.boss -= h.p;
                state.items.push(id);
                if(id === 2) state.multi *= 2;
                state.upgrades++;
                save(); updateUI(); renderMarket();
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        // ПАССИВНЫЙ ДОХОД
        setInterval(() => {
            let passive = 0;
            if(state.items.includes(1)) passive += 0.1;
            if(state.items.includes(3)) passive += 5;
            if(state.items.includes(4)) state.rub += 0.01;
            
            state.boss += passive;
            document.getElementById('hashrate').innerText = `Speed: ${passive.toFixed(2)} H/s`;
            save(); updateUI();
        }, 1000);

        function updateUI() {
            document.getElementById('boss-bal').innerText = Math.floor(state.boss);
            document.getElementById('rub-bal').innerText = state.rub.toFixed(2) + " ₽";
            document.getElementById('multi').innerText = `x${state.multi.toFixed(1)}`;
            document.getElementById('up-count').innerText = `${state.upgrades}/12`;
        }

        function save() { localStorage.setItem('BOSS_NEURAL_V1', JSON.stringify(state)); }
        window.onload = () => { updateUI(); showTab('core'); };
    </script>
</body>
</html>
