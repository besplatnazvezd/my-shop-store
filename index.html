<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Digital Shop - Автоматическое наличие</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 12px; width: 200px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .name { font-weight: bold; font-size: 1.2em; margin-bottom: 10px; }
        .price { color: #28a745; font-size: 1.5em; margin: 10px 0; }
        .stock { color: #666; font-size: 0.9em; }
        .btn { display: block; background: #007bff; color: white; text-decoration: none; padding: 10px; border-radius: 5px; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="shop" style="display:contents;"></div>

    <script>
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('shop');
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="card">
                            <div class="name">${item.name}</div>
                            <div class="stock">В наличии: ${item.stock} шт.</div>
                            <div class="price">${item.price}</div>
                            <a href="https://t.me/ТВОЙ_НИК" class="btn">Купить</a>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
