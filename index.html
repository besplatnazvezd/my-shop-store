                .history-item { border-bottom: 1px dashed #333; padding-bottom: 8px; margin-bottom: 8px; }

<body class="p-4 pb-24">

    <!-- Шапка профиля -->
    <div class="p-4 flex justify-between items-end">
        <div>
            <p class="text-[10px] opacity-40 uppercase font-black">Доступный баланс</p>
            <h1 id="balance" class="text-2xl font-black text-yellow-500">0.00 ₽</h1>
        </div>
        <div class="text-right">
            <p id="username" class="text-xs font-bold">@guest</p>
            <p id="userid" class="text-[9px] opacity-30">ID: 000000</p>
        </div>
    </div>

    <main id="app"></main>

    <nav class="nav-bar">
        <div onclick="render('create')" id="n-create" class="nav-item">Создать</div>
        <div onclick="render('buy')" id="n-buy" class="nav-item active">Купить</div>
        <div onclick="render('sell')" id="n-sell" class="nav-item">Продать</div>
        <div onclick="render('profile')" id="n-profile" class="nav-item">Профиль</div>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    const ADMIN_ID = "7727345054";

    let state = JSON.parse(localStorage.getItem('BOSS_CRYPTO_V2')) || {
        balance: 1000,
        myCoins: {},
        createdCoins: [],
        allCoins: [
            { id: 0, name: "Boss Token", ticker: "BOSS", price: 100, supply: 1000000, avatar: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Placeholder_widget.png/640px-Placeholder_widget.png", history: [90, 95, 100, 110, 105, 100] },
            { id: 1, name: "Bitcoin", ticker: "BTC", price: 65000, supply: 21000000, avatar: "https://cryptologos.cc/logos/bitcoin-btc-logo.png", history: [64000, 65000, 64500, 65500, 65000] },
            { id: 2, name: "Solana", ticker: "SOL", price: 140, supply: 500000000, avatar: "https://cryptologos.cc/logos/solana-sol-logo.png", history: [130, 135, 145, 140, 142] }
        ],
        history: [],
        activeChartTime: '5s'
    };

    // --- АДМИНСКИЙ БАЛАНС ---
    const user = tg.initDataUnsafe?.user || { id: "7727345054", username: "nmproda_test" };
    if (String(user.id) === ADMIN_ID) {
        state.balance = 1000000;
    }

    let selectedTicker = state.allCoins[0].ticker;
    let chartInstance = null;

    function save() {
        localStorage.setItem('BOSS_CRYPTO_V2', JSON.stringify(state));
        document.getElementById('balance').innerText = state.balance.toLocaleString('ru-RU') + ' ₽';
    }

    // --- РЕНДЕРИНГ ---
    function render(page) {
        const app = document.getElementById('app');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('n-' + page).classList.add('active');

        if (page === 'create') {
            app.innerHTML = `
                <div class="boss-card p-5 space-y-3">
                    <h2 class="text-center font-black text-yellow-500 uppercase italic">Запуск новой монеты</h2>
                    <input type="text" id="c-name" placeholder="Название монеты">
                    <input type="text" id="c-ticker" placeholder="Тикер (напр. BOSS)">
                    <input type="number" id="c-invest" placeholder="Сумма вложений (₽)">
                    <input type="number" id="c-supply" placeholder="Эмиссия (шт.)">
                    <label class="block text-[10px] opacity-40 uppercase font-black mb-1">Аватар монеты:</label>
                    <input type="file" id="c-avatar-file" accept="image/*" class="bg-transparent border-dashed border-2 p-2 text-xs">
                    <button onclick="processCreate()" class="btn-gold w-full py-4 mt-2 text-xs">ОПЛАТИТЬ И СОЗДАТЬ</button>
                </div>`;
        }

        if (page === 'buy') {
            const coin = state.allCoins.find(c => c.ticker === selectedTicker);
            app.innerHTML = `
                <div class="graph-window mb-4">
                    <div class="graph-controls">
                        ${['5s', '10s', '15s', '1h', '1d'].map(t => `
                            <div onclick="setChartTime('${t}')" class="graph-time-btn ${state.activeChartTime === t ? 'active' : ''}">${t}</div>
                        `).join('')}
                    </div>
                    <canvas id="chartCanvas"></canvas>
                </div>
                <div class="mb-4">
                    ${state.allCoins.map(c => `
                        <div class="boss-card coin-list-item ${selectedTicker === c.ticker ? 'border-yellow-500' : ''}" onclick="selectCoin('${c.ticker}')">
                            <img src="${c.avatar}" class="coin-avatar">
                            <div>
                                <p class="font-black">${c.ticker}</p>
                                <p class="text-[9px] opacity-40">${c.name}</p>
                            </div>
                            <div class="ml-auto text-right">
                                <p class="font-bold">${c.price.toFixed(2)} ₽</p>
                                <p class="${getTrendClass(c.history)} text-[9px]">${getTrendChange(c.history)}%</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="boss-card p-5">
                    <div class="flex justify-between mb-4">
                        <span class="font-black">${coin.name}</span>
                        <span class="font-bold text-yellow-500">${coin.price.toFixed(4)} ₽</span>
                    </div>
                    <input type="number" id="buy-sum" placeholder="Сумма покупки (₽)" value="100" class="mb-3">
                    <button onclick="processBuy()" class="btn-gold w-full py-4 text-xs">КУПИТЬ МОНЕТУ</button>
                </div>`;
            renderChart(coin.history);
        }

        if (page === 'sell') {
            const myTickers = Object.keys(state.myCoins);
            app.innerHTML = `
                <h2 class="text-[10px] opacity-40 font-black mb-4 uppercase">Ваши активы</h2>
                ${myTickers.length === 0 ? '<p class="text-center py-10 opacity-20">У вас пока нет монет</p>' : 
                myTickers.map(t => {
                    const coin = state.allCoins.find(c => c.ticker === t);
                    const amount = state.myCoins[t];
                    const value = amount * (coin ? coin.price : 0);
                    return `
                        <div class="boss-card coin-list-item">
                            <img src="${coin?.avatar}" class="coin-avatar">
                            <div>
                                <p class="font-black">${t}</p>
                                <p class="text-[10px] opacity-40">${amount.toFixed(2)} шт.</p>
                            </div>
                            <div class="ml-auto text-right">
                                <p class="font-bold text-yellow-500">${value.toFixed(2)} ₽</p>
                                <button onclick="processSell('${t}')" class="text-[8px] font-black text-red-500 uppercase mt-1">Продать всё</button>
                            </div>
                        </div>`;
                }).join('')}`;
        }

        if (page === 'profile') {
            const totalProfit = state.history.reduce((acc, curr) => acc + (curr.type === 'SELL' ? curr.profit : 0), 0);
            app.innerHTML = `
                <div class="boss-card p-6 mb-4 text-center">
                    <p class="text-[10px] opacity-40 uppercase font-black mb-1">Ваша общая прибыль</p>
                    <h2 class="text-3xl font-black ${totalProfit >= 0 ? 'text-green-500' : 'text-red-500'}">${totalProfit.toFixed(2)} ₽</h2>
                </div>
                <h3 class="text-[10px] opacity-40 font-black uppercase mb-2">История сделок</h3>
                <div class="space-y-2">
                    ${state.history.slice(-10).reverse().map(h => `
                        <div class="boss-card profile-card flex justify-between items-center text-[10px]">
                            <span class="${h.type === 'BUY' ? 'text-green-500' : (h.type === 'SELL' ? 'text-red-500' : 'text-yellow-500')} font-black">${h.type}</span>
                            <span class="font-bold">${h.ticker || h.name}</span>
                            <span class="opacity-40">${new Date(h.date).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })}</span>
                            <span class="font-bold">${h.sum.toFixed(2)} ₽</span>
                        </div>
                    `).join('')}
                </div>`;
        }
        save();
    }

    // --- ГРАФИК ---
    let chartInstance = null;
    function renderChart(history) {
        const canvas = document.getElementById('chartCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        // Очистка предыдущего графика
        if (chartInstance) chartInstance.destroy();

        const dataPoints = history.slice(-20).map((price, index) => ({ x: index, y: price }));
        const startPrice = dataPoints.length > 0 ? dataPoints[0].y : 0;
        const endPrice = dataPoints.length > 0 ? dataPoints[dataPoints.length - 1].y : 0;
        const isUp = endPrice >= startPrice;

        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, isUp ? 'rgba(0, 200, 83, 0.3)' : 'rgba(255, 61, 0, 0.3)'); // Green for up, Red for down
        gradient.addColorStop(1, 'transparent');

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: dataPoints.map(p => ''), // Пустые метки для простоты
                datasets: [{
                    label: 'Price',
                    data: dataPoints.map(p => p.y),
                    borderColor: isUp ? '#00c853' : '#ff3d00',
                    backgroundColor: gradient,
                    fill: true,
                    tension: 0.4, // Сглаживание линии
                    pointRadius: 0,
                    borderWidth: 3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { display: false },
                    y: { display: false, beginAtZero: false }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: false }
                },
                interaction: { mode: null }
            }
        });
    }

    function setChartTime(time) {
        state.activeChartTime = time;
        // Тут нужна логика для загрузки исторических данных для выбранного времени
        // Пока просто обновляем UI
        document.querySelectorAll('.graph-time-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.graph-time-btn[onclick="setChartTime('${time}')"]`).classList.add('active');
        // Для примера, просто симулируем небольшое изменение истории
        const coin = state.allCoins.find(c => c.ticker === selectedTicker);
        const lastPrice = coin.history[coin.history.length - 1];
        const newHistory = [lastPrice];
        for(let i=0; i<15; i++) {
            const volatility = (Math.random() - 0.5) * 0.01;
            newHistory.push(newHistory[newHistory.length-1] * (1 + volatility));
        }
        renderChart(newHistory);
    }

    function getTrendClass(history) {
        if (history.length < 2) return 'coin-price-neutral';
        const last = history[history.length - 1];
        const prev = history[history.length - 2];
        if (last > prev) return 'coin-price-up';
        if (last < prev) return 'coin-price-down';
        return 'coin-price-neutral';
    }
    function getTrendChange(history) {
        if (history.length < 2) return '0.00';
        const last = history[history.length - 1];
        const prev = history[history.length - 2];
        const change = ((last - prev) / prev) * 100;
        return change.toFixed(2);
    }

    // --- ДЕЙСТВИЯ ---
    function processCreate() {
        const name = document.getElementById('c-name').value;
        const ticker = document.getElementById('c-ticker').value.toUpperCase();
        const invest = parseFloat(document.getElementById('c-invest').value);
        const supply = parseFloat(document.getElementById('c-supply').value);
        const avatarFile = document.getElementById('c-avatar-file').files[0];

        if (!name || !ticker || !invest || !supply || !avatarFile) {
            alert("Заполните все поля!");
            return;
        }
        if (state.balance < invest) return alert("Недостаточно средств!");

        const reader = new FileReader();
        reader.onload = (e) => {
            const avatarUrl = e.target.result;
            const initialPrice = invest / supply;

            const newCoin = {
                id: Date.now(), // Уникальный ID
                name, ticker, price: initialPrice, supply, avatar: avatarUrl,
                history: [initialPrice * 0.9, initialPrice],
                creator: user.username,
                creatorId: user.id
            };

            state.balance -= invest;
            state.allCoins.push(newCoin);
            state.myCoins[ticker] = (state.myCoins[ticker] || 0) + (invest / initialPrice);
            state.createdCoins.push(ticker);
            state.history.push({ type: 'CREATE', name: `${name} (${ticker})`, sum: invest, date: Date.now() });
            
            alert("Монета успешно создана!");
            render('buy');
        };
        reader.readAsDataURL(avatarFile);
    }

    function processBuy() {
        const sum = parseFloat(document.getElementById('buy-sum').value);
        const coin = state.allCoins.find(c => c.ticker === selectedTicker);
        if (!sum || sum < 10 || state.balance < sum) return alert("Ошибка: некорректная сумма или недостаточно средств!");

        const amount = sum / coin.price;
        state.balance -= sum;
        state.myCoins[selectedTicker] = (state.myCoins[selectedTicker] || 0) + amount;
        
        // Pump effect
        coin.price *= 1.05;
        coin.history.push(coin.price);
        
        state.history.push({ type: 'BUY', ticker: selectedTicker, sum: sum, date: Date.now() });
        render('buy');
    }

    function processSell(t) {
        const coin = state.allCoins.find(c => c.ticker === t);
        const amount = state.myCoins[t];
        const sum = amount * coin.price;

        state.balance += sum;
        delete state.myCoins[t];
        
        // Dump effect
        coin.price *= 0.90;
        coin.history.push(coin.price);

        state.history.push({ type: 'SELL', ticker: t, sum: sum.toFixed(2), profit: sum, date: Date.now() });
        render('sell');
    }

    // --- СИМУЛЯЦИЯ РЫНКА ---
    function simulateMarket() {
        state.allCoins.forEach(c => {
            let volatility = (Math.random() - 0.5) * 0.02; // +/- 1%
            
            // Симуляция "больших" движений для определенных монет
            if (c.ticker === 'BOSS' && Math.random() < 0.05) volatility *= 3; // BOSS может сильно расти/падать
            if (c.ticker === 'BTC' && Math.random() < 0.02) volatility *= 2; // BTC тоже может колебаться
            
            c.price *= (1 + volatility);
            c.price = Math.max(0.01, c.price); // Цена не может быть меньше 0.01

            c.history.push(c.price);
            if (c.history.length > 20) c.history.shift(); // Ограничиваем историю
        });
        if (currentTab === 'buy' && chartInstance) {
            const coin = state.allCoins.find(c => c.ticker === selectedTicker);
            renderChart(coin.history);
        }
    }

    // --- ИНИЦИАЛИЗАЦИЯ ---
    document.getElementById('username').innerText = '@' + user.username;
    document.getElementById('userid').innerText = 'ID: ' + user.id;
    render('buy');

    // Запуск симуляции рынка каждые 5 секунд
    setInterval(simulateMarket, 5000);
</script>
