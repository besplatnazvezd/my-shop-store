<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        .cat-active { background: #fbbf24 !important; color: #000 !important; font-weight: 900; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-click:active { transform: scale(0.95); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="select-none">

    <!-- ШАПКА -->
    <header class="sticky top-0 z-50 bg-black/90 backdrop-blur-xl p-4 border-b border-yellow-500/20 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black italic text-yellow-500 uppercase tracking-tighter leading-none">BOSS STORE</h1>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-1 italic">Digital Agency</p>
        </div>
        <div class="flex gap-2">
            <!-- ПОДДЕРЖКА НА nmproda -->
            <button onclick="tg.openTelegramLink('https://t.me/nmproda')" class="bg-yellow-500/10 px-3 py-2 rounded-xl text-[10px] font-black border border-yellow-500/20 text-yellow-500 uppercase italic tracking-widest">Поддержка</button>
            <div class="bg-white/10 px-3 py-2 rounded-xl text-xs font-bold border border-white/10">🛒 <span id="cart-count">0</span></div>
        </div>
    </header>

    <!-- КАТЕГОРИИ -->
    <div id="cat-list" class="flex gap-2 overflow-x-auto no-scrollbar p-4 sticky top-[72px] z-40 bg-black/50 backdrop-blur-sm border-b border-white/5"></div>

    <!-- ВИТРИНА -->
    <main class="p-4 pb-48">
        <div id="catalog" class="grid grid-cols-2 gap-4">
            <p class="col-span-2 text-center py-10 text-gray-500 animate-pulse uppercase text-[10px] font-bold">Загрузка витрины...</p>
        </div>
    </main>

    <!-- ПАНЕЛЬ КОРЗИНЫ -->
    <div id="checkout-bar" class="fixed bottom-6 left-4 right-4 z-50 glass p-5 rounded-[32px] hidden border-yellow-500/40 shadow-2xl shadow-yellow-500/10">
        <div class="flex justify-between items-center">
            <div>
                                <p class="text-[10px] text-gray-400 uppercase font-black mb-1">К оплате:</p>
                <p id="total-price" class="text-2xl font-black text-yellow-500 italic leading-none">0 ₽</p>
            </div>
            <button onclick="confirmOrder()" id="main-confirm-btn" class="bg-yellow-500 text-black px-10 py-4 rounded-2xl font-black uppercase text-sm btn-click shadow-lg shadow-yellow-500/20 italic tracking-tighter">Оформить</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- ТВОИ НАСТРОЙКИ ---
        const SHEETDB_URL = 'https://sheetdb.io/api/v1/5gnvz043vf750';
        const BOT_TOKEN = '8730430332:AAGff_PCX2059o3EUwG-d9C19uTqcH4sAZ4'; 
        const ADMIN_ID = '7727345054'; 
        const BOT_USER = 'BossStore_robot'; // Юз бота для реквизитов

        // РЕКВИЗИТЫ, КОТОРЫЕ УЙДУТ КЛИЕНТУ
        const REKVIZITY = `💰 РЕКВИЗИТЫ ДЛЯ ОПЛАТЫ:\n\n` +
                          `💳 Т-Банк (Карта): 2200 7019 5529 9232\n` +
                          `📞 СБП (Т-Банк): +7 950 170 07 87\n` +
                          `🅿️ ЮMoney (Счет): 4100119121976236\n\n` +
                          `✅ После оплаты обязательно пришлите скриншот чека @nmproda`;

        let products = [];
        let cart = [];
        let currentCat = 'Все';

        async function loadData() {
            try {
                const res = await fetch(SHEETDB_URL);
                products = await res.json();
                products = products.map(p => ({
                    ...p,
                    Price: parseFloat(p.Price) || 0,
                    Image: p.Image || 'https://via.placeholder.com/150'
                }));
                renderCats();
                renderItems();
            } catch (e) {
                document.getElementById('catalog').innerHTML = "<p class='col-span-2 text-center text-red-500'>Ошибка связи</p>";
            }
        }

        function renderCats() {
            const list = ['Все', ...new Set(products.map(p => p.Category))];
            document.getElementById('cat-list').innerHTML = list.map(c => `
            </div>
                </div>
            `).join('');
        }

        function addToCart(idx) {
            cart.push(products[idx]);
            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        }

        function updateUI() {
            const total = cart.reduce((s, p) => s + p.Price, 0);
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('total-price').innerText = total + ' ₽';
            const bar = document.getElementById('checkout-bar');
            if (cart.length > 0) bar.classList.remove('hidden');
            else bar.classList.add('hidden');
        }

        async function confirmOrder() {
            const btn = document.getElementById('main-confirm-btn');
            const total = cart.reduce((s, p) => s + p.Price, 0);
            if (cart.length === 0) return;

            btn.innerText = "ОФОРМЛЯЕМ...";
            btn.disabled = true;

            const user = tg.initDataUnsafe.user || { first_name: 'Покупатель', id: null, username: '' };
            const itemsList = cart.map(item => `• ${item.Name} (${item.Price}₽)`).join('\n');

            // 1. Сообщение Админу (Тебе)
            const adminText = `🚀 НОВЫЙ ЗАКАЗ!\n\n👤 Клиент: ${user.first_name}\n🆔 ID: ${user.id}\n🔗 Ник: @${user.username || 'нет'}\n\n🛒 Товары:\n${itemsList}\n\n💰 Итого: ${total} ₽`;

            // 2. Сообщение Клиенту (Реквизиты)
            const userText = `✅ Ваш заказ на сумму ${total} ₽ принят!\n\n${REKVIZITY}`;

            try {
                // Отправка админу
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: ADMIN_ID, text: adminText, parse_mode: 'Markdown' })
                });

                // Отправка клиенту
                if (user.id) {
                    const userRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: user.id, text: userText })
                    });

                    if (userRes.ok) {
                        tg.showAlert("Заказ принят! Реквизиты отправлены вам в личку ботом @" + BOT_USER);
                    } else {
                        // Если бот не смог написать (клиент не нажал Старт)
                        tg.showPopup({
                            title: "Почти готово!",
                            message: "Чтобы получить реквизиты, пожалуйста, перейдите в нашего бота и нажмите 'Старт'.",
                            buttons: [{id: 'link', type: 'default', text: 'Перейти в бота'}]
                        }, (buttonId) => {
                            if (buttonId === 'link') tg.openTelegramLink('https://t.me/' + BOT_USER);
                        });
                    }
                }

                // --- ОЧИСТКА КОРЗИНЫ ---
                cart = [];
                updateUI();

            } catch (e) {
                tg.showAlert("Произошла ошибка, но заказ уже ушел админу. Напишите в поддержку @nmproda");
            } finally {
                btn.disabled = false;
                btn.innerText = "Оформить";
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
