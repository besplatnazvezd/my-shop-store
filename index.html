<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS CRYPTO PUMP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; margin: 0; padding-bottom: 110px; overflow-x: hidden; }
        .boss-card { background: #0d0d0d; border: 1px solid rgba(255,215,0,0.1); border-radius: 18px; }
        .btn-gold { background: linear-gradient(180deg, #FFD700 0%, #BA8B02 100%); color: #000; font-weight: 900; border-radius: 12px; }
        
        /* График */
        .white-graph { background: #fff; border-radius: 20px; height: 260px; position: relative; padding: 10px; margin-bottom: 15px; }
        .chart-controls { position: absolute; top: 12px; left: 12px; display: flex; gap: 5px; z-index: 10; }
        .time-btn { background: rgba(0,0,0,0.05); color: #000; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; cursor: pointer; }
        .time-btn.active { background: #000; color: #fff; }

        /* Список монет */
        .coin-row { display: flex; align-items: center; padding: 12px; margin-bottom: 10px; transition: 0.2s; border: 1px solid transparent; }
        .coin-row.active { border-color: #FFD700; background: rgba(255,215,0,0.05); }
        .coin-img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #222; }

        input, select { background: #1a1a1a !important; border: 1px solid #333 !important; border-radius: 12px; padding: 12px; color: #fff; width: 100%; outline: none; font-size: 14px; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #050505; border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 15px 0 35px; z-index: 999; }
        .nav-item { font-size: 10px; font-weight: 900; color: #444; text-transform: uppercase; }
        .nav-item.active { color: #FFD700; }

        .stat-val { font-weight: 900; color: #FFD700; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="p-5 flex justify-between items-start">
        <div>
                      <p class="text-[10px] opacity-40 uppercase font-black tracking-widest">Доступный баланс</p>
            <h1 id="top-balance" class="text-3xl font-black text-yellow-500">0.00 ₽</h1>
        </div>
        <div class="text-right">
            <p id="top-username" class="text-xs font-bold">@nmproda</p>
            <p id="top-userid" class="text-[9px] opacity-30">ID: 7727345054</p>
        </div>
    </div>

    <!-- Main View -->
    <div id="main-app" class="px-4"></div>

    <!-- Navigation -->
    <nav class="nav-bar">
        <div onclick="changePage('create')" id="n-create" class="nav-item">Создать</div>
        <div onclick="changePage('buy')" id="n-buy" class="nav-item active">Купить</div>
        <div onclick="changePage('sell')" id="n-sell" class="nav-item">Продать</div>
        <div onclick="changePage('profile')" id="n-profile" class="nav-item">Профиль</div>
    </nav>

<script>
    // --- ДАННЫЕ И ИНИЦИАЛИЗАЦИЯ ---
    const ADMIN_ID = "7727345054";
    let tgUser = { id: ADMIN_ID, username: "nmproda" }; 
    
    // Пытаемся получить данные из Телеграм
    try {
        if(window.Telegram.WebApp.initDataUnsafe.user) {
            tgUser = window.Telegram.WebApp.initDataUnsafe.user;
        }
    } catch(e) {}

    let state = JSON.parse(localStorage.getItem('BOSS_EXCHANGE_DATA')) || {
        balance: 1000,
        myCoins: {}, 
        history: [],
        coins: [
            { id: 1, name: "Bitcoin", ticker: "BTC", price: 67240.152, avatar: "https://cryptologos.cc/logos/bitcoin-btc-logo.png", history: [67100, 67200, 67150, 67240] },
            { id: 2, name: "Solana", ticker: "SOL", price: 142.715, avatar: "https://cryptologos.cc/logos/solana-sol-logo.png", history: [138, 140, 145, 142] },
            { id: 3, name: "Boss Token", ticker: "BOSS", price: 55.422, avatar: "https://i.ibb.co/L9Y0XyF/boss.png", history: [50, 52, 58, 55] }
        ]
    };

    // Проверка на админа
    if (String(tgUser.id) === ADMIN_ID) {
        state.balance = 1000000;
    }

    let currentPage = 'buy';
    let selectedTicker = "BOSS";
    let chartObj = null;

    function save() {
        localStorage.setItem('BOSS_EXCHANGE_DATA', JSON.stringify(state));
              document.getElementById('top-balance').innerText = state.balance.toLocaleString() + ' ₽';
    }

    // --- ГРАФИК (Chart.js) ---
    function initChart(coin) {
        const ctx = document.getElementById('cryptoChart').getContext('2d');
        if(chartObj) chartObj.destroy();

        const isUp = coin.history[coin.history.length-1] >= coin.history[0];
        const color = isUp ? '#00c853' : '#ff3d00';

        chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: coin.history.map((_, i) => i),
                datasets: [{
                    data: coin.history,
                    borderColor: color,
                    borderWidth: 3,
                    pointRadius: 0,
                    tension: 0.3,
                    fill: true,
                    backgroundColor: isUp ? 'rgba(0,200,83,0.1)' : 'rgba(255,61,0,0.1)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: false },
                scales: {
                    x: { display: false },
                    y: { 
                        position: 'right',
                        ticks: { color: '#888', font: { size: 10, weight: 'bold' }, callback: (v) => v.toFixed(3) },
                        grid: { color: 'rgba(0,0,0,0.05)' }
                    }
                }
            }
        });
    }

    // --- РЕНДЕРИНГ СТРАНИЦ ---
    function changePage(page) {uppercase">Ваш кошелек</h2>
                ${myTickers.length === 0 ? '<div class="p-10 text-center opacity-20 font-bold">Пусто</div>' : 
                myTickers.map(t => {
                    const c = state.coins.find(co => co.ticker === t);
                    if(!c) return '';
                    return `
                        <div class="boss-card p-4 flex justify-between items-center mb-3">
                            <div class="flex items-center">
                                <img src="${c.avatar}" class="w-10 h-10 rounded-full mr-3">
                                <div><p class="font-black">${t}</p><p class="text-[10px] opacity-40">${state.myCoins[t].toFixed(2)} шт</p></div>
                            </div>
                            <div class="text-right">
                                <p class="font-black text-yellow-500">${(state.myCoins[t]*c.price).toFixed(2)} ₽</p>
                                <button onclick="sellAction('${t}')" class="text-[9px] font-black text-red-500 uppercase mt-1">Продать всё</button>
                            </div>
                        </div>`;
                }).join('')}
            `;
        }

        if(page === 'profile') {
            const profit = state.history.reduce((a,b) => a + (b.profit || 0), 0);
            main.innerHTML = `
                <div class="boss-card p-6 mb-4 flex flex-col items-center">
                    <p class="text-[10px] font-black opacity-40 uppercase mb-2">Общая прибыль</p>
                    <h2 class="text-4xl font-black ${profit >= 0 ? 'text-green-500' : 'text-red-500'}">${profit.toFixed(2)} ₽</h2>
                </div>
                <div class="grid grid-cols-2 gap-2 mb-6">
                    <div class="boss-card p-4 text-center">
                        <p class="text-[8px] opacity-40 uppercase font-bold">Сделок</p>
                        <p class="stat-val text-lg">${state.history.length}</p>
                    </div>
                    <div class="boss-card p-4 text-center">
                        <p class="text-[8px] opacity-40 uppercase font-bold">Создано</p>
                        <p class="stat-val text-lg">${state.coins.filter(c => c.creator === tgUser.id).length}</p>
                    </div>
                </div>
                <h3 class="text-[10px] font-black opacity-30 mb-3 uppercase">История операций</h3>
                <div class="space-y-2">
                    ${state.history.slice(-10).reverse().map(h => `
                        <div class="boss-card p-3 flex justify-between items-center text-[10px]">
                            <span class="font-black ${h.type === 'BUY' ? 'text-green-500' : 'text-red-500'}">${h.type}</span>
                            <span class="font-bold">${h.ticker}</span>
                            <span class="opacity-30">${h.date}</span>
                            <span class="font-black">${h.sum} ₽</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        save();
    }

    // --- ФУНКЦИИ МОЖЕТ ---
    function selectCoin(t) {
        selectedTicker = t;
        changePage('buy');
    }

    function buyAction() {
        const val = parseFloat(document.getElementById('buy-amount').value);
        const coin = state.coins.find(c => c.ticker === selectedTicker);
        if(!val || state.balance < val) return alert("Ошибка баланса!");

        state.balance -= val;
        state.myCoins[selectedTicker] = (state.myCoins[selectedTicker] || 0) + (val / coin.price);
        
        coin.price *= 1.02; // Памп при покупке
        coin.history.puscurrentPage = page;
        const main = document.getElementById('main-app');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('n-' + page).classList.add('active');

        if(page === 'buy') {
            const coin = state.coins.find(c => c.ticker === selectedTicker) || state.coins[0];
            main.innerHTML = `
                <div class="white-graph">
                    <div class="chart-controls">
                        <div class="time-btn active">5с</div>
                        <div class="time-btn">10с</div>
                        <div class="time-btn">15с</div>
                        <div class="time-btn">1ч</div>
                        <div class="time-btn">1д</div>
                    </div>
                    <canvas id="cryptoChart"></canvas>
                </div>
                <div class="space-y-2 mb-6">
                    ${state.coins.map(c => `
                        <div onclick="selectCoin('${c.ticker}')" class="boss-card coin-row ${selectedTicker === c.ticker ? 'active' : ''}">
                            <img src="${c.avatar}" class="coin-img mr-3">
                            <div class="flex-1">
                                <p class="font-black text-sm">${c.ticker}</p>
                                <p class="text-[9px] opacity-40 uppercase">${c.name}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-black text-sm">${c.price.toFixed(3)} ₽</p>
                                <p class="text-[9px] ${c.history[c.history.length-1] >= c.history[0] ? 'text-green-500' : 'text-red-500'}">
                                    ${((c.price/c.history[0]-1)*100).toFixed(2)}%
                                </p>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="boss-card p-5">
                    <p class="text-[10px] font-black opacity-30 mb-2">ПОКУПКА ${selectedTicker}</p>
                    <input type="number" id="buy-amount" placeholder="Сумма (₽)" class="mb-3">
                    <button onclick="buyAction()" class="btn-gold w-full py-4 text-xs">КУПИТЬ МОНЕТУ</button>
                </div>
            `;
            initChart(coin);
        }

        if(page === 'create') {
            main.innerHTML = `
                <div class="boss-card p-6 space-y-4">
                    <h2 class="text-center font-black text-yellow-500 uppercase tracking-tighter">Создать свою крипту</h2>
                    <input type="text" id="c-name" placeholder="Название (напр. Musk Coin)">
                    <input type="text" id="c-ticker" placeholder="Тикер (напр. MUSK)">
                    <input type="number" id="c-invest" placeholder="Сколько вложите (₽)">
                    <input type="number" id="c-supply" placeholder="Эмиссия (сколько шт)">
                    <input type="number" id="c-price" placeholder="Начальная цена (₽)">
                    <div>
                        <p class="text-[9px] font-black opacity-40 mb-2 uppercase ml-1">Аватарка монеты</p>
                        <input type="file" id="c-file" accept="image/*" class="text-xs">
                    </div>
                    <button onclick="createAction()" class="btn-gold w-full py-4 text-xs mt-2">ОПЛАТИТЬ И ВЫПУСТИТЬ</button>
                </div>
            `;
        }

        if(page === 'sell') {
            const myTickers = Object.keys(state.myCoins);
            main.innerHTML = `
                <h2 class="text-[10px] font-black opacity-30 mb-4h(coin.price);
        state.history.push({ type: 'BUY', ticker: selectedTicker, sum: val, date: new Date().toLocaleTimeString() });
        
        changePage('buy');
    }

    function sellAction(t) {
        const coin = state.coins.find(c => c.ticker === t);
        const amt = state.myCoins[t];
        const sum = amt * coin.price;
        
        state.balance += sum;
        delete state.myCoins[t];
        
        coin.price *= 0.95; // Дамп при продаже
        coin.history.push(coin.price);
        state.history.push({ type: 'SELL', ticker: t, sum: sum.toFixed(2), profit: sum * 0.1, date: new Date().toLocaleTimeString() });
        
        changePage('sell');
    }

    function createAction() {
        const name = document.getElementById('c-name').value;
        const ticker = document.getElementById('c-ticker').value.toUpperCase();
        const invest = parseFloat(document.getElementById('c-invest').value);
        const supply = parseFloat(document.getElementById('c-supply').value);
        const price = parseFloat(document.getElementById('c-price').value);
        const file = document.getElementById('c-file').files[0];

        if(!name || !ticker || !invest || state.balance < invest) return alert("Данные неверны!");

        const reader = new FileReader();
        reader.onload = function(e) {
            const newCoin = {
                id: Date.now(),
                name, ticker, price, supply,
                avatar: e.target.result,
                history: [price * 0.95, price],
                creator: tgUser.id
            };
            state.balance -= invest;
            state.coins.push(newCoin);
            state.myCoins[ticker] = invest / price;
            state.history.push({ type: 'CREATE', ticker, sum: invest, date: new Date().toLocaleTimeString() });
            changePage('buy');
        };
        if(file) reader.readAsDataURL(file);
        else alert("Загрузите фото монеты!");
    }

    // Рыночная симуляция
    setInterval(() => {
        state.coins.forEach(c => {
            const change = (Math.random() - 0.5) * 0.01;
            c.price *= (1 + change);
            c.history.push(c.price);
            if(c.history.length > 30) c.history.shift();
        });
        if(currentPage === 'buy') initChart(state.coins.find(c => c.ticker === selectedTicker));
    }, 4000);

    // Старт
    document.getElementById('top-username').innerText = '@' + tgUser.username;
    document.getElementById('top-userid').innerText = 'ID: ' + tgUser.id;
    changePage('buy');
</script>
</body>
</html>
