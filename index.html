<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; }
        .cat-active { background: #fbbf24 !important; color: #000 !important; font-weight: 900; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="select-none overflow-x-hidden">

    <header class="sticky top-0 z-50 bg-black/90 backdrop-blur-xl p-4 border-b border-yellow-500/20">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-black italic text-yellow-500 leading-none">BOSS STORE</h1>
            <div class="bg-white/10 px-4 py-2 rounded-2xl text-xs font-bold border border-white/10">🛒 <span id="cart-count">0</span></div>
        </div>
        <div id="cat-list" class="flex gap-2 overflow-x-auto no-scrollbar pb-1"></div>
    </header>

    <main class="p-4 pb-32">
        <div id="catalog" class="grid grid-cols-2 gap-4">
            <p class="col-span-2 text-center py-10 text-gray-500 animate-pulse">ЗАГРУЗКА ВИТРИНЫ...</p>
        </div>
    </main>

    <div id="checkout-bar" class="fixed bottom-6 left-4 right-4 z-50 glass p-5 rounded-[32px] hidden border-yellow-500/40 shadow-2xl">
        <div class="flex justify-between items-center">
            <div>
                <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest">Сумма:</p>
                <p id="total-price" class="text-2xl font-black text-yellow-500">0 ₽</p>
            </div>
            <button onclick="openPay()" class="bg-yellow-500 text-black px-10 py-4 rounded-2xl font-black uppercase text-sm">Оформить</button>
        </div>
    </div>

    <!-- Модалка Оплаты -->
    <div id="pay-modal" class="fixed inset-0 bg-black z-[100] hidden p-6 overflow-y-auto">
        <button onclick="closePay()" class="text-yellow-500 font-bold mb-8 uppercase text-sm">← Назад</button>
        <h2 class="text-4xl font-black mb-6 uppercase italic leading-none">Оплата</h2>
        <div class="glass p-6 rounded-[32px] border-yellow-500/30">
                        <div class="bg-black/60 p-5 rounded-2xl mb-6 text-center border border-white/5">
                <p class="text-gray-400 text-[10px] uppercase mb-2">Перевод на карту (Т-Банк):</p>
                <p class="text-white font-bold text-lg mb-4 select-all">2200 7019 5529 9232</p>
                <p class="text-gray-400 text-[10px] uppercase mb-2">Номер телефона (СБП):</p>
                <p class="text-white font-bold text-lg select-all">+7 950 170 07 87</p>
            </div>
            <button onclick="confirmOrder()" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase text-sm shadow-xl">Я ОПЛАТИЛ(А)</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ССЫЛКА ИЗ SHEETDB.IO - ТЕПЕРЬ ВСЁ ПОЛЕТИТ!
        const SHEETDB_URL = 'https://sheetdb.io/api/v1/5gnvz043vf750'; 

        let products = [];
        let cart = [];
        let currentCat = 'Все';

        async function loadData() {
            try {
                const res = await fetch(SHEETDB_URL);
                products = await res.json();
                
                // Исправляем цены (превращаем в числа)
                products = products.map(p => ({
                    ...p,
                    Price: parseFloat(p.Price) || 0, // Убеждаемся, что цена - это число
                    Image: p.Image || 'https://via.placeholder.com/150' // Если нет картинки, ставим заглушку
                }));

                renderCats();
                renderItems();
            } catch (e) {
                console.error("Ошибка загрузки данных из SheetDB:", e);
                document.getElementById('catalog').innerHTML = "<p class='col-span-2 text-center py-10 text-red-400'>Ошибка загрузки витрины.<br>Проверьте доступ к таблице в Google Sheet или ссылку на SheetDB.</p>";
            }
        }

        function renderCats() {
            const list = ['Все', ...new Set(products.map(p => p.Category))];
            document.getElementById('cat-list').innerHTML = list.map(c => `
                            <button onclick="setCat('${c}')" class="cat-btn bg-white/5 px-5 py-2.5 rounded-2xl whitespace-nowrap text-[10px] uppercase font-black border border-white/5 ${currentCat === c ? 'cat-active' : ''}">${c}</button>
            `).join('');
        }

        function setCat(c) {
            currentCat = c;
            renderCats();
            renderItems();
            tg.HapticFeedback.impactOccurred('light');
        }

        function renderItems() {
            const grid = document.getElementById('catalog');
            const filtered = currentCat === 'Все' ? products : products.filter(p => p.Category === currentCat);
            grid.innerHTML = filtered.map((p, i) => `
                <div class="glass p-3 rounded-[28px] flex flex-col h-full border-white/5">
                    <img src="${p.Image}" class="w-full aspect-square object-cover rounded-[22px] mb-3">
                    <h3 class="text-[11px] font-black uppercase leading-tight mb-1">${p.Name}</h3>
                    <p class="text-[9px] text-gray-500 mb-3 flex-1 italic">${p.Description || ''}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-yellow-500 font-black text-sm">${p.Price} ₽</span>
                        <button onclick="addToCart(${products.indexOf(p)})" class="bg-white text-black w-8 h-8 rounded-xl font-black">+</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(idx) {
            cart.push(products[idx]);
            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        }

        function updateUI() {
            const total = cart.reduce((s, p) => s + p.Price, 0);
            document.getElementById('cart-count').innerText = cart.length;
            if(cart.length > 0) {
                document.getElementById('checkout-bar').classList.remove('hidden');
                document.getElementById('total-price').innerText = total + ' ₽';
            } else {
                document.getElementById('checkout-bar').classList.add('hidden');
            }
        }

        function openPay() { document.getElementById('pay-modal').classList.remove('hidden'); tg.HapticFeedback.notificationOccurred('success'); }
        function closePay() { document.getElementById('pay-modal').classList.add('hidden'); }

        function confirmOrder() {
            tg.showConfirm("Вы подтверждаете оплату?", (ok) => {
                if(ok) {
                    // Здесь ты можешь отправить данные заказа себе, например, в Telegram
                    const orderDetails = {
                        user: tg.initDataUnsafe.user,
                        cart: cart.map(item => ({name: item.Name, price: item.Price})),
                        total: cart.reduce((s, p) => s + p.Price, 0)
                    };
                    tg.sendData(JSON.stringify(orderDetails)); // Отправляем заказ в твоего бота
                    
                    tg.showAlert("Заказ отправлен! Пришлите скриншот чека админу (@твой_ник_админа) для быстрой выдачи.");
                    tg.close(); // Закрываем Mini App
                    cart = []; // Очищаем корзину
                    updateUI();
                }
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
