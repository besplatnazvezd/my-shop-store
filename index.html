<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .cat-active { background: #fbbf24 !important; color: #000 !important; font-weight: 900; transform: scale(1.05); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="select-none overflow-x-hidden">

    <header class="sticky top-0 z-50 bg-black/90 backdrop-blur-xl p-4 border-b border-yellow-500/20">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-2xl font-black italic text-yellow-500 leading-none">BOSS STORE</h1>
                <p id="admin-status" class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-1">Digital Agency</p>
            </div>
            <div id="cart-btn" class="bg-white/10 px-4 py-2 rounded-2xl text-xs font-bold border border-white/10">🛒 <span id="cart-count">0</span></div>
        </div>
        
        <!-- КАТЕГОРИИ -->
        <div id="cat-list" class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
            <!-- Категории вставятся из JS -->
        </div>
    </header>

    <main class="p-4 pb-32">
        <!-- ОПИСАНИЕ КАТЕГОРИИ -->
        <div id="cat-description" class="mb-6 p-4 glass rounded-3xl text-xs text-gray-300 italic border-l-4 border-yellow-500 hidden">
            <!-- Текст описания категории -->
        </div>

        <!-- ТОВАРЫ -->
        <div id="catalog" class="grid grid-cols-2 gap-4">
            <p class="col-span-2 text-center py-10 text-gray-500 animate-pulse uppercase text-xs font-bold">Загрузка витрины...</p>
        </div>
    </main>

    <!-- КНОПКА КУПИТЬ -->
    <div id="checkout-bar" class="fixed bottom-6 left-4 right-4 z-50 glass p-5 rounded-[32px] hidden border-yellow-500/40 shadow-2xl">
        <div class="flex justify-between items-center">
            <div>
                <p class="text-[10px] text-gray-400 uppercase font-black">Итого:</p>
                                <p id="total-price" class="text-2xl font-black text-yellow-500">0 ₽</p>
            </div>
            <button onclick="openPay()" class="bg-yellow-500 text-black px-10 py-4 rounded-2xl font-black uppercase text-sm">Оформить</button>
        </div>
    </div>

    <!-- МОДАЛКА ОПЛАТЫ -->
    <div id="pay-modal" class="fixed inset-0 bg-black z-[100] hidden p-6 overflow-y-auto">
        <button onclick="closePay()" class="text-yellow-500 font-bold mb-8 uppercase text-sm">← Назад</button>
        <h2 class="text-4xl font-black mb-2 uppercase italic">Оплата</h2>
        <p class="text-gray-500 text-[10px] uppercase font-bold mb-8 tracking-widest">Прямой перевод по реквизитам</p>
        
        <div class="space-y-4">
            <div class="glass p-6 rounded-[32px] border-yellow-500/30">
                <p class="text-yellow-500 font-bold text-xs mb-4 uppercase text-center">Ваша карта / СБП</p>
                <div class="bg-black/60 p-5 rounded-2xl mb-6 text-center border border-white/5">
                    <p class="text-gray-400 text-[10px] uppercase mb-2">Номер карты (Т-Банк):</p>
                    <p class="text-white font-bold text-lg mb-4 select-all">2200 7019 5529 9232</p>
                    <p class="text-gray-400 text-[10px] uppercase mb-2">Номер телефона (СБП):</p>
                    <p class="text-white font-bold text-lg select-all">+7 950 170 07 87</p>
                </div>
                <button onclick="confirmOrder()" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase text-sm shadow-xl">Я ОПЛАТИЛ(А)</button>
            </div>
            <button onclick="tg.showAlert('Счет в CryptoBot скоро будет доступен!')" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase text-xs">Оплатить через CryptoBot</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const ADMIN_ID = 7727345054;
        // ВСТАВЬ СЮДА СВОЮ ССЫЛКУ НА CSV ИЗ ШАГА 2
        const SHEET_URL = 'ССЫЛКА_ИЗ_ШАГА_2'; 

        // Описания категорий (можешь менять текст тут)
        const catInfo = {
            "Telegram Premium": "Официальная подписка гифтом. Гарантия на весь срок.",
                      "РОБУКСЫ": "Быстрое начисление Robux на ваш аккаунт через Login/Pass или Gamepass.",
            "Telegram stars": "Звезды для оплаты ботов и контента в Telegram.",
            "PUBG and METRO": "UC и паки для PUBG Mobile. Моментальная отправка по ID.",
            "ПРОДВЖЕНИЕ Telegram": "Подписчики, просмотры и реакции от живых пользователей.",
            "Default": "Лучшие цифровые товары по самым низким ценам."
        };

        let products = [];
        let cart = [];
        let currentCat = 'Все';

        async function loadData() {
            try {
                const res = await fetch(SHEET_URL);
                const csv = await res.text();
                const lines = csv.split('\n').slice(1);
                products = lines.map(line => {
                    const [cat, name, price, desc, img] = line.split(',');
                    return { cat: cat?.trim(), name: name?.trim(), price: parseInt(price), desc: desc?.trim(), img: img?.trim() };
                }).filter(p => p.name);
                renderCats();
                renderItems();
            } catch (e) { document.getElementById('catalog').innerHTML = "Ошибка таблицы. Проверь 'Опубликовать в интернете'"; }
        }

        function renderCats() {
            const list = ['Все', ...new Set(products.map(p => p.cat))];
            document.getElementById('cat-list').innerHTML = list.map(c => `
                <button onclick="setCat('${c}')" class="cat-btn bg-white/5 px-5 py-2.5 rounded-
                2xl whitespace-nowrap text-[10px] uppercase font-black border border-white/5 ${currentCat === c ? 'cat-active' : ''}">${c}</button>
            `).join('');
        }

        function setCat(c) {
            currentCat = c;
            const info = document.getElementById('cat-description');
            if(catInfo[c]) {
                info.innerText = catInfo[c];
                info.classList.remove('hidden');
            } else { info.classList.add('hidden'); }
            renderCats();
            renderItems();
            tg.HapticFeedback.impactOccurred('light');
        }

        function renderItems() {
            const grid = document.getElementById('catalog');
            const filtered = currentCat === 'Все' ? products : products.filter(p => p.cat === currentCat);
            grid.innerHTML = filtered.map((p, i) => `
                <div class="glass p-3 rounded-[28px] flex flex-col h-full border-white/5">
                    <img src="${p.img || 'https://via.placeholder.com/150'}" class="w-full aspect-square object-cover rounded-[22px] mb-3 shadow-2xl">
                    <h3 class="text-[11px] font-black uppercase leading-tight mb-1">${p.name}</h3>
                    <p class="text-[9px] text-gray-500 mb-3 flex-1 italic">${p.desc || ''}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-yellow-500 font-black text-sm">${p.price} ₽</span>
                        <button onclick="addToCart(${products.indexOf(p)})" class="bg-white text-black w-8 h-8 rounded-xl font-black">+</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(idx) {
            cart.push(products[idx]);
            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        }

        function updateUI() {
            const total = cart.reduce((s, p) => s + p.price, 0);
            document.getElementById('cart-count').innerText = cart.length;
            if(cart.length > 0) {
                document.getElementById('checkout-bar').classList.remove('hidden');
                document.getElementById('total-price').innerText = total + ' ₽';
            }
        }

        function openPay() { document.getElementById('pay-modal').classList.remove('hidden'); tg.HapticFeedback.notificationOccurred('success'); }
        function closePay() { document.getElementById('pay-modal').classList.add('hidden'); }

        function confirmOrder() {
            tg.showConfirm("Вы подтверждаете, что перевели деньги на карту?", (ok) => {
                if(ok) {
                    tg.showAlert("Заказ отправлен! Скиньте чек админу в ЛС.");
                    tg.close();
                }
            });
        }

        window.onload = () => {
            const user = tg.initDataUnsafe.user;
            if(user?.id === ADMIN_ID) document.getElementById('admin-status').innerText = "BOSS MODE ACTIVE";
            loadData();
        };
    </script>
</body>
</html>
