<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Shop - Mini App</title>
    <style>
        :root {
            /* Темная тема (Черный / Золотой) */
            --bg-color: #000000;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --accent-color: #d4af37;
            --secondary-text: #aaaaaa;
            --input-bg: #222;
        }

        body.light-theme {
            /* Светлая тема (Белый / Голубой) */
            --bg-color: #ffffff;
            --card-bg: #f0f8ff;
            --text-color: #000000;
            --accent-color: #007bff;
            --secondary-text: #555555;
            --input-bg: #e9ecef;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        body { background: var(--bg-color); color: var(--text-color); margin: 0; padding-bottom: 70px; }
        
        .container { padding: 15px; }
        .hidden { display: none !important; }

        /* Шапка */
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--accent-color); }
        .theme-toggle { cursor: pointer; font-size: 20px; }

        /* Карточки товаров */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .product-card { 
            background: var(--card-bg); border-radius: 12px; padding: 10px; 
            border: 1px solid var(--accent-color); position: relative;
        }
        .product-card img { width: 100%; border-radius: 8px; height: 100px; object-fit: cover; }
        .flag { position: absolute; top: 5px; left: 5px; font-size: 20px; }
        .price { color: var(--accent-color); font-weight: bold; font-size: 1.1em; }
        .buy-btn { 
            background: var(--accent-color); color: white; border: none; 
            width: 100%; padding: 8px; border-radius: 5px; cursor: pointer; margin-top: 5px;
        }

        /* Навигация */
        nav { 
            position: fixed; bottom: 0; width: 100%; background: var(--card-bg); 
            display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid var(--accent-color);
        }
        nav div { cursor: pointer; text-align: center; font-size: 12px; color: var(--secondary-text); }
        nav div.active { color: var(--accent-color); font-weight: bold; }

        /* Формы и окна */
                input, select, textarea { 
            width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; 
            border: 1px solid var(--accent-color); background: var(--input-bg); color: var(--text-color);
        }
        .modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card-bg); padding: 20px; border-radius: 15px;
            width: 90%; z-index: 100; border: 2px solid var(--accent-color);
        }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 90; }

        /* Профиль */
        .profile-info { text-align: center; margin-bottom: 20px; }
        .profile-menu { display: flex; flex-direction: column; gap: 10px; }
        .profile-menu-item { padding: 10px; border-bottom: 1px solid var(--input-bg); display: flex; justify-content: space-between; }

        /* Мини-игра */
        #gameCanvas { background: #333; display: block; margin: 0 auto; border-radius: 10px; max-width: 100%; }

        /* Кнопка "О, я доволен" */
        .happy-btn { background: #28a745; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-top: 20px; cursor: pointer; font-weight: bold;}

    </style>
</head>
<body>

    <header>
        <div id="app-title">ELITE SHOP</div>
        <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
    </header>

    <div class="container" id="main-content">
        <!-- Сюда динамически подгружаются страницы -->
    </div>

    <!-- Модальное окно оплаты -->
    <div id="payment-modal" class="modal hidden">
        <h3>Оплата заказа</h3>
        <p>Переведите сумму на реквизиты ниже:</p>
        <div style="background: #333; padding: 10px; border-radius: 5px; color: gold;" id="payment-details">
            ВСТАВЬ РЕКВИЗИТЫ (2200 5529 7019 9232/ххххх)
        </div>
        <button onclick="copyDetails()" class="buy-btn" style="margin-top: 10px;">Копировать реквизиты</button>
        <div class="happy-btn" onclick="confirmPayment()">О, я доволен, жми на меня</div>
        <button onclick="closePayment()" class="buy-btn" style="background: #666;">Закрыть</button>
    </div>
    <div id="overlay" class="overlay hidden" onclick="closePayment()"></div>

    <nav>
                <div onclick="showPage('shop')" id="nav-shop">Магазин</div>
        <div onclick="showPage('articles')" id="nav-articles">Статьи</div>
        <div onclick="showPage('game')" id="nav-game">Игра</div>
        <div onclick="showPage('profile')" id="nav-profile">Профиль</div>
    </nav>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1bxpXTKxDHUwk5VX79PeXbjxrJxAkzaZag6opznV_Kq8/export?format=csv';
        const MANAGER_USER = 'nmproda';
        const MANAGER_ID = '7727345054';
        const BOT_TOKEN = '8780961369:AAHsQp2Fi4N1swxLkpE2Jxn74fvv4qitJLM'; // Для отправки уведомлений
        
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let products = [];
        let vouchers = [
            {code: 'PROMO10', discount: 10, count: 5},
            {code: 'GOLD2026', discount: 50, count: 1}
        ];

        // --- ИНИЦИАЛИЗАЦИЯ ---
        function init() {
            if (!currentUser) {
                showAuth();
            } else {
                showPage('shop');
            }
            loadProducts();
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }

        // --- АВТОРИЗАЦИЯ ---
        function showAuth() {
            const html = `
                <div class="modal">
                    <h2>Вход / Регистрация</h2>
                    <input type="text" id="auth-login" placeholder="Логин (или почта)">
                    <input type="password" id="auth-pass" placeholder="Пароль">
                    <button class="buy-btn" onclick="login()">Войти</button>
                    <button class="buy-btn" style="background:#444" onclick="register()">Регистрация</button>
                    <p onclick="alert('Восстановление через почту: скоро появится')" style="font-size:12px; cursor:pointer">Забыли пароль?</p>
                </div>
            `;
            document.getElementById('main-content').innerHTML = html;
        }

        function register() {
            const l = document.getElementById('auth-login').value;
            const p = document.getElementById('auth-pass').value;
            if(l && p) {
                let user = { login: l, pass: p, email: l, balance: 0, date: new Date().toLocaleDateString(), history: [] };
                localStorage.setItem('currentUser', JSON.stringify(user));
                currentUser = user;
                location.reload();
            }
        }

        function login() {
            const l = document.getElementById('auth-login').value;
            const p = document.getElementById('auth-pass').value;
            let stored = JSON.parse(localStorage.getItem('currentUser'));
            if(stored && stored.login === l && stored.pass === p) {
                currentUser = stored;
                showPage('shop');
            } else {
                alert('Неверные данные');
            }
        }

        // --- ЗАГРУЗКА ТОВАРОВ (CSV) ---
        async function loadProducts() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                products = rows.map(row => {
                    const cols = row.split(',');
                    return {
                        cat: cols[0], name: cols[1], price: cols[2], desc: cols[3], img: cols[4], count: cols[5], flag: cols[6]
                    };
                });
                if (document.getElementById('nav-shop').classList.contains('active')) showPage('shop');
            } catch (e) {
                console.log("Ошибка загрузки товаров. Использую демо-данные.");
                products = [
                    {cat: 'A', name: 'Premium TG', price: '500', desc: 'На месяц', img: 'ВСТАВЬ ССЫЛКУ НА КАРТИНКУ', count: 10, flag: '🇷🇺'},
                    {cat: 'B', name: 'Stars', price: '100', desc: '50 звезд', img: 'ВСТАВЬ ССЫЛКУ НА КАРТИНКУ', count: 50, flag: '🌍'}
                ];
            }
        }

        // --- РОУТИНГ ---
        function showPage(page) {
            document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
            document.getElementById('nav-' + page).classList.add('active');
            const container = document.getElementById('main-content');

            if (page === 'shop') {
                let html = '<div class="grid">';
                products.forEach((p, index) => {
                    html += `
                        <div class="product-card">
                            <span class="flag">${p.flag || '📦'}</span>
                            <img src="${p.img}" alt="pic">
                            <div style="font-weight:bold; margin: 5px 0;">${p.name}</div>
                            <div style="font-size:12px; color:var(--secondary-text)">${p.desc}</div>
                            <div class="price">${p.price} ₽</div>
                            <input type="number" value="1" min="1" max="${p.count}" id="qty-${index}" style="width:50px; padding:2px">
                            <button class="buy-btn" onclick="openPayment(${index})">Купить</button>
                        </div>
                    `;});
                container.innerHTML = html + '</div>';
            } 
            
            else if (page === 'profile') {
                container.innerHTML = `
                    <div class="profile-info">
                        <img src="ВСТАВЬ ССЫЛКУ НА КАРТИНКУ" style="width:80px; border-radius:50%">
                        <h2>${currentUser.login}</h2>
                        <p>Баланс: ${currentUser.balance} ₽ (ваучеры)</p>
                        <p>Дата регистрации: ${currentUser.date}</p>
                    </div>
                    <div class="profile-menu">
                        <div class="profile-menu-item"><span>Сменить логин:</span> <input type="text" placeholder="Новый логин" onchange="updateProfile('login', this.value)"></div>
                        <div class="profile-menu-item"><span>Сменить пароль:</span> <input type="password" placeholder="Новый пароль" onchange="updateProfile('pass', this.value)"></div>
                        <div class="profile-menu-item"><span>Сменить почту:</span> <input type="email" placeholder="Новая почта" onchange="updateProfile('email', this.value)"></div>
                        <div class="profile-menu-item"><span>Ваучер:</span> <input type="text" placeholder="Код" id="v-code"> <button onclick="useVoucher()" class="buy-btn" style="width:80px">OK</button></div>
                        <div class="profile-menu-item"><span>Пополнить:</span> <button onclick="window.open('ССЫЛКА_НА_ОПЛАТУ')" class="buy-btn">Картой</button></div>
                        <hr>
                        <div onclick="showContentPage('FAQ')">FAQ</div>
                        <div onclick="showContentPage('Оферта')">Оферта</div>
                        <div onclick="showContentPage('Почему нам доверяют')">Доверие</div>
                        <div onclick="showContentPage('О нас')">О нас</div>
                        <h3>История покупок:</h3>
                        <div id="history-list">${currentUser.history.map(h => `<div>${h.date} - ${h.item} (${h.price}₽)</div>`).join('') || 'Нет покупок'}</div>
                    </div>
                `;
            }

            else if (page === 'articles') {
                container.innerHTML = `<h2>Статьи</h2><div class="product-card"><h3>Новости Телеграм</h3><p>Тут ваши новости о аккаунтах...</p><img src="ВСТАВЬ ССЫЛКУ НА КАРТИНКУ" style="width:100%"></div>`;
            }

            else if (page === 'game') {
                container.innerHTML = `
                    <div style="text-align:center">
                        <h2>Ferrari Challenge</h2>
                        <p>Очки: <span id="score">0</span></p>
                        <canvas id="gameCanvas" width="300" height="400"></canvas>
                        <p>Управляйте кнопками ниже или кликом</p>
                        <button class="buy-btn" onclick="startGame()">Начать игру</button>
                    </div>
                `;
            }
        }

        function showContentPage(title) {
            document.getElementById('main-content').innerHTML = `
                <button onclick="showPage('profile')" class="buy-btn" style="width:100px">⬅ Назад</button>
                <h2>${title}</h2>
                <p>Здесь будет ваш текст для страницы "${title}". Вставьте его сами в HTML код.</p>
                <img src="ВСТАВЬ ССЫЛКУ НА КАРТИНКУ" width="100%">
            `;
        }

        // --- ЛОГИКА ОПЛАТЫ ---
        let currentOrder = null;
        function openPayment(index) {
            const qty = document.getElementById('qty-'+index).value;
            const product = products[index];
            const totalPrice = product.price * qty;
            currentOrder = {name: product.name, qty: qty, price: totalPrice };
            
            document.getElementById('payment-modal').classList.remove('hidden');
            document.getElementById('overlay').classList.remove('hidden');
        }

        function closePayment() {
            document.getElementById('payment-modal').classList.add('hidden');
            document.getElementById('overlay').classList.add('hidden');
        }

        function copyDetails() {
            const text = document.getElementById('payment-details').innerText;
            navigator.clipboard.writeText(text);
            alert('Реквизиты скопированы!');
        }

        function confirmPayment() {
            // Имитация отправки в бот
            const message = `Привет! Купил(а) ${currentOrder.name} в кол-ве ${currentOrder.qty}. Юз: @${currentUser.login}, ID: ${MANAGER_ID}. Выдай заказ!`;
            const url = `https://t.me/${MANAGER_USER}?text=${encodeURIComponent(message)}`;
            
            // Сохраняем в историю
            currentUser.history.push({date: new Date().toLocaleDateString(), item: currentOrder.name, price: currentOrder.price});
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            
            window.open(url, '_blank');
            closePayment();
            alert('Заявка отправлена менеджеру!');
        }

        // --- ВАУЧЕРЫ ---
        function useVoucher() {
            const code = document.getElementById('v-code').value;
            const vIndex = vouchers.findIndex(v => v.code === code && v.count > 0);
            if(vIndex !== -1) {
                currentUser.balance += vouchers[vIndex].discount;
                vouchers[vIndex].count--;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                alert(`Ваучер активирован! Добавлено ${vouchers[vIndex].discount} ₽`);
                showPage('profile');
            } else {
                alert('Неверный код или закончились активации');
            }
        }

        function updateProfile(key, val) {
            currentUser[key] = val;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            alert('Данные обновлены');
        }

        // --- МИНИ ИГРА (FERRARI) ---
        let gameInterval;
        function startGame() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            let carX = 135;
            let obstacles = [];
            let score = 0;
            let gameActive = true;

            if(gameInterval) clearInterval(gameInterval);

            gameInterval = setInterval(() => {
                if(!gameActive) return;
                ctx.clearRect(0,0,300,400);
                
                // Дорога
                ctx.fillStyle = "#444";
                ctx.fillRect(0,0,300,400);

                // Игрок (Феррари)
                ctx.fillStyle = "red";
                ctx.fillRect(carX, 350, 30, 40);

                // Препятствия
                if(Math.random() < 0.05) obstacles.push({x: Math.random()*270, y: -40});
                
                obstacles.forEach((o, i) => {
                    o.y += 5;
                    ctx.fillStyle = "gold";
                    ctx.fillRect(o.x, o.y, 30, 30);

                    // Коллизия
                    if(o.y > 320 && o.y < 390 && o.x > carX - 25 && o.x < carX + 25) {
                        gameActive = false;
                        alert("Игра окончена! Очки: " + score);
                        clearInterval(gameInterval);
                    }

                    if(o.y > 400) {
                        obstacles.splice(i, 1);
                        score++;document.getElementById('score').innerText = score;
                    }
                });
            }, 30);

            canvas.onclick = (e) => {
                if(e.offsetX < 150) carX = Math.max(10, carX - 30);
                else carX = Math.min(260, carX + 30);
            };
        }

        window.onload = init;
    </script>
</body>
</html>
