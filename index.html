<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS COIN V9.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #bc13fe; --red: #ff3e3e; --green: #10b981; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* ГРАФИК */
        #chart-area { background: #fff; border-radius: 25px; padding: 15px; box-shadow: 0 0 30px rgba(188,19,254,0.2); }
        .tf-btn { padding: 5px 10px; font-size: 9px; border-radius: 8px; background: #eee; color: #000; font-weight: 800; }
        .tf-btn.active { background: var(--neon); color: #fff; }

        /* ПЕРСОНАЖ */
        #avatar-box { width: 200px; height: 260px; background: #111; border-radius: 40px; margin: 20px auto; position: relative; border: 2px solid #222; }
        .layer { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; transition: 0.4s; transform: scale(0); z-index: 10; }
        .layer.active { transform: scale(1); }
        .mannequin { font-size: 100px; opacity: 0.2; z-index: 1; }
        .head { top: -70px; font-size: 60px; }
        .eyes { top: -50px; font-size: 30px; }
        .body { top: 30px; font-size: 80px; }
        .shoes { bottom: -80px; font-size: 40px; }

        .card { background: #111; border: 1px solid #222; border-radius: 22px; padding: 15px; }
        .tab-btn { flex: 1; text-align: center; padding: 12px; font-size: 10px; font-weight: 900; opacity: 0.3; }
        .tab-btn.active { opacity: 1; color: var(--neon); border-bottom: 2px solid var(--neon); }

        /* ШТРАФ АНИМАЦИЯ */
        #penalty-alert { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: var(--red); color: white; padding: 20px; border-radius: 20px; z-index: 1000; display: none; text-align: center; font-weight: 900; box-shadow: 0 0 50px rgba(255,0,0,0.5); }
    </style>
</head>
<body class="p-4">

    <div id="penalty-alert">
                <div class="text-4xl mb-2">⚠️ ШТРАФ!</div>
        <div class="text-sm uppercase">Отписка ранее 7 дней:<br>-2 BOSS COIN</div>
    </div>

    <!-- BALANCE -->
    <div class="flex justify-between items-center mb-4 px-2">
        <div>
            <p class="text-[9px] opacity-40 uppercase font-black">Mining Profit</p>
            <div class="flex items-center gap-2">
                <span id="bal-boss" class="orbitron text-2xl text-purple-500 font-black">0</span>
                <span class="text-purple-400 text-xs font-bold">BOSS</span>
            </div>
        </div>
        <div class="text-right">
            <p id="bal-rub" class="orbitron text-xl text-yellow-500 font-black">0.00 ₽</p>
            <p class="text-[8px] opacity-40 uppercase">Capitalization</p>
        </div>
    </div>

    <!-- TABS -->
    <div class="flex bg-white/5 rounded-2xl mb-4">
        <button onclick="tab('trade')" id="t-trade" class="tab-btn active">БИРЖА</button>
        <button onclick="tab('mine')" id="t-mine" class="tab-btn">МАЙНИНГ</button>
        <button onclick="tab('shop')" id="t-shop" class="tab-btn">РЫНОК</button>
        <button onclick="tab('profile')" id="t-profile" class="tab-btn">ПРОФИЛЬ</button>
    </div>

    <!-- TRADE -->
    <div id="p-trade">
        <div id="chart-area">
            <div class="flex justify-between items-center mb-4">
                <div class="flex gap-1">
                    <button onclick="setTf(2000, this)" class="tf-btn active">5S</button>
                    <button onclick="setTf(10000, this)" class="tf-btn">10S</button>
                    <button onclick="setTf(60000, this)" class="tf-btn">1H</button>
                    <button onclick="setTf(300000, this)" class="tf-btn">1D</button>
                </div>
                <div class="text-right">
                    <div id="price" class="orbitron text-2xl font-black text-black">24.39</div>
                    <div id="trend" class="text-[10px] font-bold text-green-500">+0.00%</div>
                </div>
            </div>
            <canvas id="chart"></canvas>
        </div>
        <div class="flex gap-4 mt-6">
                        <button onclick="trade('buy')" class="flex-1 bg-green-500 py-4 rounded-2xl font-black shadow-lg">КУПИТЬ</button>
            <button onclick="trade('sell')" class="flex-1 bg-red-500 py-4 rounded-2xl font-black shadow-lg">ПРОДАТЬ</button>
        </div>
    </div>

    <!-- PROFILE -->
    <div id="p-profile" class="hidden">
        <div id="avatar-box">
            <div class="mannequin layer active">👤</div>
            <div id="s-head" class="layer head"></div>
            <div id="s-eyes" class="layer eyes"></div>
            <div id="s-body" class="layer body"></div>
            <div id="s-shoes" class="layer shoes"></div>
        </div>
        <div class="text-center mb-6">
            <h2 id="u-name" class="orbitron text-xl font-black">BOSS</h2>
            <p class="text-[10px] text-purple-400 font-black">EMPIRE OWNER</p>
        </div>
        <button onclick="openExchange()" class="w-full bg-white/5 border border-white/10 py-4 rounded-2xl font-black uppercase text-xs">🤝 ОБМЕН (Команда /obmen)</button>
    </div>

    <div id="p-shop" class="hidden grid grid-cols-2 gap-3"></div>
    <div id="p-mine" class="hidden grid grid-cols-2 gap-3"></div>

    <script>
        const tg = window.Telegram.WebApp;
        const BOT_TOKEN = "8730430332:AAGff_PCX2059o3EUwG-d9C19uTqcH4sAZ4";
        const CHANNELS = [
            {id: "@osnovabossstore", name: "BOSS CH"},
            // Добавь остальные 19 тут
        ];

        let price = 24.39;
        let tf = 2000;
        let state = JSON.parse(localStorage.getItem('BOSS_V9')) || {
            boss: 0, rub: 100, items: [], subs: {}, lastVisit: Date.now()
        };

        // ТОВАРЫ
        const ITEMS = [
            {id: 1, n: "Корона", p: 100, i: "👑", s: "head"},
            {id: 2, n: "Очки", p: 30, i: "🕶", s: "eyes"},
            {id: 3, n: "Костюм", p: 200, i: "👔", s: "body"},
            {id: 4, n: "Кроссы", p: 50, i: "👟", s: "shoes"}
        ];

        // ГРАФИК
        let ctx = document.getElementById('chart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(15).fill(''), datasets: [{ data: Array(15).fill(24.39), borderColor: '#10b981', borderWidth: 4, fill: false, tension: 0.4, pointRadius: 0 }] },
            options: { responsive: true, scales: { x: { display: false }, y: { display: true, position: 'right' } }, plugins: { legend: { display: false } } }
        });

        function updatePrice() {
            let change = (Math.random() - 0.48) * 6;
            price += change;
            if(price < 4.99) price = 4.99; if(price > 119) price = 119;
            chart.data.datasets[0].data.push(price);
            chart.data.datasets[0].data.shift();
            chart.data.datasets[0].borderColor = change >= 0 ? '#10b981' : '#ef4444';
            chart.update('none');
            document.getElementById('price').innerText = price.toFixed(2);
            document.getElementById('price').style.color = change >= 0 ? '#10b981' : '#ef4444';
            document.getElementById('trend').innerText = (change >= 0 ? "+" : "") + change.toFixed(2) + "%";
        }
        let timer = setInterval(updatePrice, tf);

        function setTf(ms, btn) {
            clearInterval(timer); tf = ms; timer = setInterval(updatePrice, tf);
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // ПРОВЕРКА ПОДПИСКИ И ШТРАФОВ
        async function checkSubs() {
            const userId = tg.initDataUnsafe.user?.id;
            if(!userId) return;

            for (let chId in state.subs) {
                const subDate = state.subs[chId];
                const daysPassed = (Date.now() - subDate) / (1000 * 60 * 60 * 24);

                if(daysPassed < 7) {
                    // Запрос к боту (метод getChatMember)
                    try {
                        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChatMember?chat_id=${chId}&user_id=${userId}`);
                        const data = await res.json();
                        if(data.result && (data.result.status === 'left' || data.result.status === 'kicked')) {
                            applyPenalty(chId);
                        }
                    } catch(e) { console.log("Ошибка проверки"); }
                }
            }
        }

        function applyPenalty(chId) {
            state.boss -= 2;
            delete state.subs[chId];
            save(); updateUI();
            const alert = document.getElementById('penalty-alert');
            alert.style.display = 'block';
            tg.HapticFeedback.notificationOccurred('error');
            setTimeout(() => alert.style.display = 'none', 5000);
        }

        async function mine(id) {
            const chId = "@osnovabossstore"; // Для примера один канал
            window.open(`https://t.me/${chId.replace('@','')}`);
            
            setTimeout(async () => {
                // Имитация проверки через бота
                state.boss += 1;
                state.subs[chId] = Date.now(); // Записываем дату подписки
                save(); updateUI();
                tg.HapticFeedback.notificationOccurred('success');
            }, 5000);
        }

        // ОБМЕН
        function openExchange() {
            const userId = tg.initDataUnsafe.user?.id;
            tg.openTelegramLink(`https://t.me/ТВОЙ_БОТ?start=obmen_${userId}`);
        }

        // ОСТАЛЬНАЯ ЛОГИКА
        function buy(id) {
            const it = ITEMS.find(x => x.id === id);
            if(state.boss >= it.p) {
                state.boss -= it.p; state.items.push(it.id);
                save(); updateUI();
            }
        }

        function tab(t) {
            ['trade', 'mine', 'shop', 'profile'].forEach(id => {
                document.getElementById(`p-${id}`).classList.toggle('hidden', id !== t);
                document.getElementById(`t-${id}`).classList.toggle('active', id === t);
            });
        }

        function renderShop() {
            const s = document.getElementById('p-shop'); s.innerHTML = "";
            ITEMS.forEach(it => {
                s.innerHTML += `<div onclick="buy(${it.id})" class="card text-center">
                    <div class="text-4xl mb-2">${it.i}</div>
                    <p class="text-[10px] font-black uppercase">${it.n}</p>
                    <p class="text-yellow-500 font-black">${it.p} BOSS</p>
                </div>`;
            });
            const m = document.getElementById('p-mine'); m.innerHTML = "";
            for(let i=1; i<=20; i++) {
                m.innerHTML += `<div onclick="mine(${i})" class="card text-center">
                    <p class="text-[9px] text-purple-500 font-black">SERVER #${i}</p>
                    <p class="text-[7px] opacity-40">MINING: 1 BOSS</p>
                </div>`;
            }
        }

        function updateUI() {
            document.getElementById('bal-boss').innerText = Math.floor(state.boss);
            document.getElementById('bal-rub').innerText = state.rub.toFixed(2) + " ₽";
            document.getElementById('u-name').innerText = (tg.initDataUnsafe.user?.first_name || "BOSS").toUpperCase();
            
            // Обновление аватара
            document.querySelectorAll('.layer').forEach(l => { if(!l.classList.contains('mannequin')) l.classList.remove('active'); });
            state.items.forEach(itemId => {
                const it = ITEMS.find(x => x.id === itemId);
                const slot = document.getElementById(`s-${it.s}`);
                slot.innerText = it.i; slot.classList.add('active');
            });
        }

        function save() { localStorage.setItem('BOSS_V9', JSON.stringify(state)); }
        window.onload = () => { renderShop(); updateUI(); checkSubs(); };
    </script>
</body>
</html>
