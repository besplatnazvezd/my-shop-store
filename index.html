<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS: LOGIC TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Unbounded:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff88; --p: #bc13fe; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Fira Code', monospace; overflow: hidden; touch-action: manipulation; }
        .unbound { font-family: 'Unbounded', sans-serif; }
        
        /* ТЕРМИНАЛ */
        .terminal-box { background: #0c0c0c; border: 2px solid #1a1a1a; border-radius: 20px; box-shadow: inset 0 0 20px rgba(0,255,136,0.05); }
        .line-num { color: #333; text-align: right; padding-right: 15px; user-select: none; }
        
        /* ПОДСКАЗКА (GHOST TEXT) */
        .input-wrapper { position: relative; width: 100%; }
        #ghost-text { position: absolute; left: 0; top: 0; color: #222; z-index: 1; pointer-events: none; white-space: pre; }
        #main-input { position: relative; z-index: 2; background: transparent; color: var(--neon); width: 100%; outline: none; border: none; caret-color: #fff; white-space: pre; }

        /* МОЗГОВОЙ МОДУЛЬ (ПАМЯТЬ) */
        .memory-slot { width: 45%; background: #111; border: 1px solid #222; border-radius: 10px; padding: 10px; font-size: 10px; }
        .memory-slot.active { border-color: var(--p); background: rgba(188, 19, 254, 0.1); }

        /* КНОПКИ */
        .btn-action { background: linear-gradient(135deg, var(--p), #6b21a8); border-radius: 16px; padding: 18px; font-weight: 900; transition: 0.2s; border: none; width: 100%; display: block; }
        .btn-action:active { transform: scale(0.96); filter: brightness(1.2); }

        /* АНИМАЦИЯ ПЕЧАТИ */
        .scanline { width: 100%; height: 2px; background: rgba(0, 255, 136, 0.1); position: absolute; top: 0; animation: scan 4s linear infinite; pointer-events: none; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body class="p-4 flex flex-col h-screen">

    <div class="scanline"></div>

    <!-- TOP: STATUS -->
    <div class="flex justify-between items-center mb-4">
        <div>
                        <p class="text-[8px] text-zinc-500 uppercase tracking-[4px]">System Logic</p>
            <h1 class="unbound text-sm text-white">CORE_LEARNING</h1>
        </div>
        <div class="text-right">
            <span id="balance" class="unbound text-lg text-[#00ff88]">0 <span class="text-[10px]">BC</span></span>
        </div>
    </div>

    <!-- MEMORY MODULE (ВИЗУАЛИЗАЦИЯ ЛОГИКИ) -->
    <div class="flex flex-wrap gap-2 mb-4 justify-between" id="memory-board">
        <div class="memory-slot" id="slot-1">
            <p class="opacity-30">VAR_X:</p>
            <span class="val text-purple-400">NULL</span>
        </div>
        <div class="memory-slot" id="slot-2">
            <p class="opacity-30">VAR_Y:</p>
            <span class="val text-purple-400">NULL</span>
        </div>
    </div>

    <!-- TERMINAL AREA -->
    <div class="terminal-box flex-1 flex flex-col p-4 overflow-hidden mb-4">
        <div class="flex mb-2 border-b border-white/5 pb-2">
            <div class="dot w-2 h-2 rounded-full bg-red-500 mr-1"></div>
            <div class="dot w-2 h-2 rounded-full bg-yellow-500 mr-1"></div>
            <div class="dot w-2 h-2 rounded-full bg-green-500"></div>
        </div>
        
        <div class="flex flex-1 text-sm overflow-y-auto">
            <div class="line-num text-[10px]">1<br>2<br>3<br>4<br>5<br>6<br>7<br>8</div>
            <div class="input-wrapper">
                <div id="ghost-text"></div>
                <textarea id="main-input" autofocus spellcheck="false" oninput="syncGhost()"></textarea>
            </div>
        </div>
        
        <div id="console-output" class="text-[10px] text-zinc-500 mt-4 border-t border-white/5 pt-2 min-h-[40px]">
            > Waiting for code input...
        </div>
    </div>

    <!-- INSTRUCTION & BUTTON -->
    <div class="mb-4">
        <div class="bg-white/5 p-4 rounded-2xl mb-4">
            <p id="task-title" class="text-[10px] font-bold text-[#00ff88] uppercase mb-1">Урок 1: Переменные</p>
            <p id="task-desc" class="text-[11px] leading-snug text-zinc-300">Создай переменную BOSS и присвой ей значение 100.</p>
        </div>
                <button onclick="executeCode()" class="btn-action unbound text-xs text-white uppercase tracking-widest">
            ВЫПОЛНИТЬ КОД (RUN)
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let state = { boss: 0, step: 0 };

        const LESSONS = [
            { 
                title: "Урок 1: Переменные", 
                desc: "Запиши в память число 100. Напиши: boss = 100", 
                hint: "boss = 100", 
                target: "boss=100",
                reward: 100,
                memory: { slot: 1, label: "BOSS:", val: "100" }
            },
            { 
                title: "Урок 2: Математика", 
                desc: "Удвой значение. Напиши: boss = boss * 2", 
                hint: "boss = boss * 2", 
                target: "boss=boss*2",
                reward: 200,
                memory: { slot: 1, label: "BOSS:", val: "200" }
            },
            { 
                title: "Урок 3: Условия (IF)", 
                desc: "Проверь, если boss больше 100, выведи 'WIN'. Напиши: if boss > 100: print('WIN')", 
                hint: "if boss > 100: print('WIN')", 
                target: "ifboss>100:print('win')",
                reward: 300,
                output: "WIN"
            },
            { 
                title: "Урок 4: Циклы (FOR)", 
                desc: "Повтори вывод 3 раза. Напиши: for i in range(3): print('OK')", 
                hint: "for i in range(3): print('OK')", 
                target: "foriinrange(3):print('ok')",
                reward: 500,
                output: "OK\nOK\nOK"
            }
        ];

        function syncGhost() {
            const input = document.getElementById('main-input');
            const ghost = document.getElementById('ghost-text');
            const currentHint = LESSONS[state.step].hint;
            
            // Если юзер ничего не ввел, показываем подсказку
            if (input.value === "") {
                ghost.innerText = currentHint;
            } else {
                ghost.innerText = "";
            }
        }

        function executeCode() {
            const code = document.getElementById('main-input').value.replace(/\s+/g, '').toLowerCase();
            const quest = LESSONS[state.step];
            const output = document.getElementById('console-output');

            tg.HapticFeedback.impactOccurred('heavy');

            if (code.includes(quest.target)) {
                // УСПЕХ
                output.innerText = `> Running...\n> ${quest.output || 'Success: Variable updated.'}`;
                output.classList.add('text-green-500');
                
                // Обновляем "память"
                if (quest.memory) {
                    const slot = document.getElementById(`slot-${quest.memory.slot}`);
                    slot.classList.add('active');
                    slot.querySelector('.val').innerText = quest.memory.val;
                    slot.querySelector('p').innerText = quest.memory.label;
                }

                state.boss += quest.reward;
                state.step++;

                setTimeout(() => {
                    if (state.step < LESSONS.length) {
                        nextLesson();
                    } else {
                        alert("ПОЗДРАВЛЯЮ! Ты освоил базу логики BOSS. Теперь ты Архитектор!");
                    }
                }, 1500);

            } else {
                // ОШИБКА
                output.innerText = `> Error: Syntax mismatch.\n> Ожидалось: ${quest.hint}`;
                output.classList.add('text-red-500');
                tg.HapticFeedback.notificationOccurred('error');
            }
            updateUI();
        }

        function nextLesson() {
            const quest = LESSONS[state.step];
            document.getElementById('main-input').value = "";
            document.getElementById('console-output').innerText = "> Waiting for code input...";
            document.getElementById('console-output').classList.remove('text-green-500', 'text-red-500');
            document.getElementById('task-title').innerText = quest.title;
            document.getElementById('task-desc').innerText = quest.desc;
            syncGhost();
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerHTML = `${state.boss} <span class="text-[10px]">BC</span>`;
        }

        window.onload = () => {
            syncGhost();
            updateUI();
        };
    </script>
</body>
</html>
