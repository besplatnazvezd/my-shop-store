<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS CITY DRIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        
        /* КАРТА ГОРОДА */
        #game-viewport {
            width: 100%; height: 350px;
            background: #111; position: relative;
            perspective: 600px; overflow: hidden;
            border-bottom: 2px solid #bc13fe;
        }
        #map {
            width: 1000px; height: 1000px;
            background-image: 
                linear-gradient(rgba(188, 19, 254, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(188, 19, 254, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            position: absolute; transition: 0.5s ease-out;
            transform: rotateX(45deg);
        }
        
        /* МАШИНА */
        #car {
            width: 40px; height: 60px;
            background: #bc13fe; position: absolute;
            box-shadow: 0 0 20px #bc13fe, 0 0 40px #bc13fe;
            border-radius: 5px; transition: 0.5s;
            z-index: 100;
        }
        #car::after { content: "🔦"; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); }

        /* ИНТЕРФЕЙС */
        .cmd-btn { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 10px; border-radius: 10px; font-size: 10px; }
        .active-cmd { border-color: #bc13fe; background: rgba(188, 19, 254, 0.2); }

        #target {
            width: 50px; height: 50px; background: rgba(255, 215, 0, 0.3);
            border: 2px dashed #FFD700; position: absolute; border-radius: 10px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <div class="p-4 flex justify-between items-center bg-black/50">
        <div>
            <p class="text-[8px] opacity-50 uppercase">Миссия:</p>
                        <p id="mission-text" class="text-[10px] text-yellow-500 font-black">ДОСТАВЬ ГРУЗ В СЕКТОР B-4</p>
        </div>
        <button onclick="showInstruction()" class="bg-white/10 px-3 py-1 rounded text-[10px]">ИНСТРУКЦИЯ</button>
    </div>

    <!-- ИГРОВОЕ ПОЛЕ (3-е ЛИЦО) -->
    <div id="game-viewport">
        <div id="map">
            <div id="target"></div>
            <div id="car"></div>
        </div>
    </div>

    <!-- ПАНЕЛЬ КОМАНД (КУМИР СТАЙЛ) -->
    <div class="p-4">
        <div class="flex gap-2 mb-4 overflow-x-auto pb-2" id="command-line">
            <!-- Сюда будут добавляться команды -->
        </div>

        <div class="grid grid-cols-4 gap-2">
            <button onclick="addCmd('forward')" class="cmd-btn">↑ ВПЕРЕД</button>
            <button onclick="addCmd('left')" class="cmd-btn">← ЛЕВО</button>
            <button onclick="addCmd('right')" class="cmd-btn">ПРАВО →</button>
            <button onclick="runCommands()" class="cmd-btn bg-purple-600 border-none font-black text-white">ПУСК!</button>
        </div>

        <div class="mt-4 flex justify-between items-center">
            <button onclick="getHint()" class="text-[10px] text-purple-400 font-bold uppercase">💡 Подсказка (-1 BOSS)</button>
            <div class="text-right">
                <p class="text-[8px] opacity-40">ОЧКИ ОПЫТА:</p>
                <p id="xp-count" class="text-sm font-black">0 XP</p>
            </div>
        </div>
    </div>

    <!-- МОДАЛКИ -->
    <div id="modal" class="fixed inset-0 bg-black/90 z-[200] hidden flex flex-col items-center justify-center p-8 text-center">
        <h2 id="modal-title" class="text-2xl font-black mb-4"></h2>
        <p id="modal-text" class="mb-8 opacity-70 text-sm"></p>
        <button onclick="closeModal()" class="bg-purple-600 px-8 py-3 rounded-xl font-black">ПОНЯТНО</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        let carX = 100, carY = 100, carRot = 0;
        let targetX = 300, targetY = 400;
        let commands = [];
        let xp = 0;

        // ИНИЦИАЛИЗАЦИЯ
        function initGame() {
            updateCar();
            placeTarget();
        }
                function updateCar() {
            const car = document.getElementById('car');
            const map = document.getElementById('map');
            
            car.style.left = carX + 'px';
            car.style.top = carY + 'px';
            car.style.transform = `rotate(${carRot}deg)`;

            // Камера следит за машиной (3-е лицо)
            map.style.left = (150 - carX) + 'px';
            map.style.top = (150 - carY) + 'px';
        }

        function placeTarget() {
            targetX = Math.floor(Math.random() * 10) * 50 + 100;
            targetY = Math.floor(Math.random() * 10) * 50 + 100;
            const t = document.getElementById('target');
            t.style.left = targetX + 'px';
            t.style.top = targetY + 'px';
        }

        function addCmd(type) {
            commands.push(type);
            const line = document.getElementById('command-line');
            const icons = {forward: '↑', left: '←', right: '→'};
            line.innerHTML += `<div class="bg-white/10 w-8 h-8 flex items-center justify-center rounded border border-white/20 text-xs">${icons[type]}</div>`;
        }

        async function runCommands() {
            if(commands.length === 0) return;
            
            for(let cmd of commands) {
                if(cmd === 'forward') {
                    const rad = (carRot - 90) * Math.PI / 180;
                    carX += Math.cos(rad) * 50;
                    carY += Math.sin(rad) * 50;
                } else if(cmd === 'left') {
                    carRot -= 90;
                } else if(cmd === 'right') {
                    carRot += 90;
                }
                updateCar();
                await new Promise(r => setTimeout(r, 600));
            }

            checkWin();
            commands = [];
            document.getElementById('command-line').innerHTML = '';
        }

        function checkWin() {
            const dist = Math.sqrt(Math.pow(carX - targetX, 2) + Math.pow(carY - targetY, 2));
            if(dist < 50) {
                xp += 100;
                document.getElementById('xp-count').innerText = xp + " XP";
                showModal("МИССИЯ ВЫПОЛНЕНА!", "Ты получил 100 XP. Машина становится мощнее!");
                placeTarget();
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                showModal("ПРОМАХ!", "Машина не доехала до цели. Попробуй составить другой маршрут.");
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        // ПОДСКАЗКА
        function getHint() {
            showModal("ПОДСКАЗКА", `Цель находится на координатах X:${targetX/50}, Y:${targetY/50}. Используй команды поворота!`);
        }

        function showInstruction() {
            showModal("КАК ИГРАТЬ", "1. Добавляй команды (Вперед, Лево, Право).\n2. Нажимай ПУСК.\n3. Твоя задача - доехать до желтого квадрата.\n4. Копи XP для тюнинга в Гараже!");
        }

        function showModal(title, text) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        window.onload = initGame;
    </script>
</body>
</html>
